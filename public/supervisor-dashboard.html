<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternTrack – SGMB Supervisor Portal</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script>
    (function() {
      const lang = localStorage.getItem('interntrack_lang') || 'en';
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    })();

  <style>
    .supervisor-badge-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fef3c7; color: #92400e;
      border: 1px solid #fde68a; border-radius: 20px;
      padding: 4px 14px; font-size: 12px; font-weight: 600;
    }
    .private-feedback-box {
      background: linear-gradient(135deg, #fef3c7, #fffbeb);
      border: 1.5px solid #f59e0b;
      border-radius: 12px; padding: 16px 18px; margin-top: 12px;
    }
    .private-feedback-box .feedback-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; color: #92400e;
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px;
    }
    .private-feedback-item {
      background: #fff; border: 1px solid #fde68a;
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    }
    .private-feedback-item:last-child { margin-bottom: 0; }
    .feedback-meta { font-size: 12px; color: #92400e; margin-bottom: 4px; font-weight: 600; }
    .feedback-text { font-size: 14px; color: #374151; line-height: 1.6; }
    .team-section { margin-bottom: 28px; }
    .team-section-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; background: var(--card-bg);
      border-radius: 12px 12px 0 0; border: 1px solid var(--border);
      border-bottom: 2px solid var(--primary);
    }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-tab { padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card-bg); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all .2s; }
    .filter-tab.active, .filter-tab:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .stat-icon.amber { background: #fef3c7; color: #92400e; }

    /* ── Achievement Board Cards ── */
    .ach-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .ach-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05); transition: box-shadow .2s; display: flex; flex-direction: column; }
    .ach-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.09); }
    .ach-card-images { display: flex; gap: 2px; overflow: hidden; max-height: 150px; background: #ebebdf; flex-shrink: 0; }
    .ach-card-images img { object-fit: cover; height: 150px; flex: 1; min-width: 120px; cursor: pointer; }
    .ach-card-body { padding: 12px 14px 8px; flex: 1; }
    .ach-card-toprow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .ach-week-badge { background: #dce8f5; color: #3d5a7d; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: .01em; }
    .ach-card-title { font-size: 14px; font-weight: 700; color: #0f172a; margin: 0 0 3px; }
    .ach-card-who { font-size: 11px; color: #94a3b8; margin-bottom: 7px; }
    .ach-card-desc { font-size: 12px; color: #374151; line-height: 1.55; margin: 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .ach-card-docs { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .ach-doc-chip { display: inline-flex; align-items: center; gap: 4px; background: #f2f2ea; border: 1px solid #e2e8f0; border-radius: 6px; padding: 3px 8px; font-size: 11px; text-decoration: none; color: #334155; font-weight: 500; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ach-doc-chip:hover { background: #e2e8f0; }
    .ach-card-footer { padding: 8px 14px 10px; border-top: 1px solid #ebebdf; background: #f4f4ed; flex-shrink: 0; }
    .ach-fb-existing { margin-bottom: 8px; }
    .ach-fb-note { padding: 4px 0; border-bottom: 1px solid #ebebdf; }
    .ach-fb-note:last-child { border-bottom: none; }
    .ach-fb-note-who { font-size: 10px; color: #92400e; font-weight: 700; margin-bottom: 1px; }
    .ach-fb-note-text { font-size: 12px; color: #374151; }
    .ach-fb-row { display: flex; gap: 6px; align-items: center; min-width: 0; }
    .ach-fb-input { flex: 1; min-width: 0; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: inherit; outline: none; background: #fff; }
    .ach-fb-input:focus { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,.12); }
    .ach-fb-btn { background: #f59e0b; color: #fff; border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; width: 56px; text-align: center; }
    .ach-fb-btn:hover { background: #d97706; }
    .ach-fb-btn:disabled { background: #fcd34d; cursor: not-allowed; }

</head>

function t(k) { return T[currentLang]?.[k] ?? T.en[k] ?? k; }

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('interntrack_lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = lang === 'ar' ? 'English' : 'عربي';
  applyTranslations();
  switchTab(currentTabName);
}

function toggleLang() { setLang(currentLang === 'en' ? 'ar' : 'en'); }

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

new MutationObserver(mutations => {
  mutations.forEach(m => {
    m.addedNodes.forEach(node => {
      if (node.nodeType !== 1) return;
      if (node.dataset?.i18n) node.textContent = t(node.dataset.i18n);
      node.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
    });
  });
}).observe(document.documentElement, { childList: true, subtree: true });

// Real-time updates
(function() {
  const es = new EventSource('/api/events');
  let _rt;
  es.onmessage = () => { clearTimeout(_rt); _rt = setTimeout(() => switchTab(currentTabName), 300); };
})();

// ── CORE ──────────────────────────────────────────────────────────────────────
const token = (() => {
  const c = document.cookie.split(';').find(c => c.trim().startsWith('token='));
  return c ? c.trim().slice(6) : localStorage.getItem('token');
})();

if (!token) { window.location.href = '/login.html'; }

let currentUser = null;
let allAchievements = [];
let currentTabName = 'overview';
let activeTeamFilter = '';

function getHeaders(json = true) {
  const h = { Authorization: 'Bearer ' + token };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}

function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function fmtDate(d) {
  if (!d) return '—';
  const s = String(d).replace(' ', 'T');
  const dt = new Date(s);
  const locale = currentLang === 'ar' ? 'ar-AE' : 'en-US';
  return isNaN(dt) ? d : dt.toLocaleDateString(locale, { month: 'short', day: 'numeric', year: 'numeric' });
}

function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(el._t); el._t = setTimeout(() => el.className = 'toast', 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
  document.getElementById('mainLayout').classList.toggle('expanded');
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  document.cookie = 'token=;max-age=0;path=/';
  localStorage.removeItem('token');
  window.location.href = '/login.html';
}

function statusBadge(status) {
  const map = {
    published: `<span class="badge badge-green">${t('badge_published')}</span>`,
    pending: `<span class="badge" style="background:#fef3c7;color:#92400e;">${t('badge_pending')}</span>`,
    draft: `<span class="badge badge-amber">${t('badge_draft')}</span>`,
    rejected: `<span class="badge" style="background:#fee2e2;color:#991b1b;">${t('badge_rejected')}</span>`
  };
  return map[status] || status;
}

function switchTab(tab) {
  currentTabName = tab;
  localStorage.setItem('supervisorCurrentTab', tab);
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(n => n.classList.remove('active'));
  const navItems = document.querySelectorAll('.sidebar-nav .nav-item');
  const idx = { overview: 0, feedback: 1, calendar: 2, settings: 3 };
  navItems[idx[tab]]?.classList.add('active');
  const titles = { overview: t('tb_overview'), feedback: t('tb_feedback'), calendar: t('nav_calendar'), settings: t('nav_settings') };
  document.getElementById('topbarTitle').textContent = titles[tab] || tab;
  const el = document.getElementById('pageContent');
  switch (tab) {
    case 'overview': renderOverview(el); break;
    case 'feedback': renderMyFeedback(el); break;
    case 'calendar': renderCalendar(el); break;
    case 'settings': renderSettings(el); break;
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }

let calendarEventsCache = [];
let remindersCache = [];
let calendarSideTab = 'events';
let editingEventId = null;

function calLocale() { return currentLang === 'ar' ? 'ar-AE' : 'en-US'; }

function calDowLabels() {
  const base = new Date(2024, 0, 1);
  return [0,1,2,3,4,5,6].map(i => {
    const d = new Date(base); d.setDate(base.getDate() + i);
    return d.toLocaleDateString(calLocale(), { weekday: 'short' });
  });
}

function calDateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

async function renderCalendar(el) {
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    [calendarEventsCache, remindersCache] = await Promise.all([
      fetch('/api/calendar-events', { headers: getHeaders() }).then(r => r.json()),
      fetch('/api/reminders', { headers: getHeaders() }).then(r => r.json())
    ]);
  } catch (e) {
    calendarEventsCache = []; remindersCache = [];
  }
  renderCalendarUI(el);
}

function switchCalSideTab(tabKey) {
  calendarSideTab = tabKey;
  renderCalendarUI(document.getElementById('pageContent'));
}

function calSidePanelBody(monthEvents) {
  if (calendarSideTab === 'reminders') {
    return `
      <div style="display:flex;flex-direction:column;gap:10px;max-height:460px;overflow-y:auto;margin-bottom:14px;">
        ${remindersCache.length ? remindersCache.map(r => `
          <div style="background:${r.Completed ? '#ebebdf' : '#dce8f5'};border-radius:12px;padding:12px 14px;${r.Completed ? 'opacity:.6;' : ''}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
              <div style="flex:1;min-width:0;">
                ${r.StartTime ? `<div style="font-size:11px;color:#3d5a7d;font-weight:700;">${escHtml(r.StartTime)}${r.EndTime ? ' - ' + escHtml(r.EndTime) : ''}</div>` : ''}
                <div style="font-weight:700;font-size:14px;text-decoration:${r.Completed ? 'line-through' : 'none'};">${escHtml(r.Title)}</div>
                ${r.Description ? `<div style="font-size:12px;color:var(--text-muted);">${escHtml(r.Description)}</div>` : ''}
                ${r.ReminderDate ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${escHtml(r.ReminderDate)}</div>` : ''}
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0;">
                <button class="btn btn-sm btn-ghost" onclick="toggleReminder(${r.ReminderID},${r.Completed ? 0 : 1})">${r.Completed ? '↺' : '✓'}</button>
                <button class="btn btn-sm btn-danger" onclick="deleteReminderItem(${r.ReminderID})">🗑️</button>
              </div>
            </div>
          </div>`).join('') : `<p class="text-muted" style="font-size:13px;">${t('no_reminders')}</p>`}
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="openReminderModal()">${t('btn_add_reminder')}</button>`;
  }


  return `
    <div style="display:flex;flex-direction:column;gap:14px;max-height:520px;overflow-y:auto;">
      ${monthEvents.length ? monthEvents.map(ev => {
        const d = new Date(ev.EventDate + 'T00:00:00');
        return `<div style="display:flex;gap:12px;">
          <div style="flex-shrink:0;background:#dce8f5;color:#3d5a7d;border-radius:10px;padding:8px 6px;text-align:center;width:46px;">
            <div style="font-weight:800;font-size:15px;">${d.getDate()}</div>
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;">${d.toLocaleDateString(calLocale(), { month: 'short' })}</div>
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:14px;">${escHtml(ev.Title)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin:2px 0;">${escHtml(ev.EventDate)}${ev.EventTime ? ' • ' + escHtml(ev.EventTime) : ''}</div>
            ${ev.Description ? `<div style="font-size:12px;color:var(--text-muted);">${escHtml(ev.Description)}</div>` : ''}
            <div style="margin-top:6px;display:flex;gap:6px;">
              <button class="btn btn-sm btn-ghost" onclick="openEventModal(${ev.EventID})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="deleteCalendarEvent(${ev.EventID})">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join('') : `<p class="text-muted" style="font-size:13px;">${t('no_events_month')}</p>`}
    </div>`;
}

function renderCalendarUI(el) {
  const year = calendarViewDate.getFullYear();
  const month = calendarViewDate.getMonth();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const eventsByDate = {};
  calendarEventsCache.forEach(ev => {
    (eventsByDate[ev.EventDate] = eventsByDate[ev.EventDate] || []).push(ev);
  });

  const now = new Date();
  const todayKey = calDateKey(now.getFullYear(), now.getMonth(), now.getDate());

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
  const monthEvents = calendarEventsCache
    .filter(ev => ev.EventDate.startsWith(monthPrefix))
    .slice()
    .sort((a, b) => (a.EventDate + (a.EventTime || '')).localeCompare(b.EventDate + (b.EventTime || '')));

  el.innerHTML = `
    <div class="page-header">
      <div><h2>${t('nav_calendar')}</h2></div>
      <button class="btn btn-primary" onclick="openEventModal()">${t('btn_add_event')}</button>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start;">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <button class="btn btn-sm btn-ghost" onclick="changeCalendarMonth(-1)">‹</button>
          <h3 style="margin:0;text-transform:capitalize;">${calendarViewDate.toLocaleDateString(calLocale(), { month: 'long', year: 'numeric' })}</h3>
          <button class="btn btn-sm btn-ghost" onclick="changeCalendarMonth(1)">›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:6px;">
          ${calDowLabels().map(d => `<div>${d}</div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
          ${cells.map(d => {
            if (!d) return `<div></div>`;
            const key = calDateKey(year, month, d);
            const has = !!eventsByDate[key];
            const isToday = key === todayKey;
            return `<div onclick="openEventModal(null,'${key}')" style="cursor:pointer;text-align:center;padding:10px 0;border-radius:10px;${isToday ? 'background:#dce8f5;' : ''}">
              <div style="font-size:13px;font-weight:${isToday ? '700' : '500'};">${d}</div>
              ${has ? `<div style="width:5px;height:5px;border-radius:50%;background:var(--primary);margin:4px auto 0;"></div>` : '<div style="height:9px;"></div>'}
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="panel">
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <button class="btn btn-sm ${calendarSideTab === 'events' ? 'btn-primary' : 'btn-ghost'}" onclick="switchCalSideTab('events')">${t('tab_events')}</button>
          <button class="btn btn-sm ${calendarSideTab === 'reminders' ? 'btn-primary' : 'btn-ghost'}" onclick="switchCalSideTab('reminders')">${t('tab_reminders')}</button>
        </div>
        ${calSidePanelBody(monthEvents)}
      </div>
    </div>

    <div class="modal-overlay" id="eventModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="eventModalTitle">${t('h_add_event')}</h3>
          <button class="modal-close" onclick="closeModal('eventModal')">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_event_title')}</label>
          <input id="eventTitle" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_description')}</label>
          <textarea id="eventDescription" class="form-textarea"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">${t('th_date')}</label>
          <input id="eventDate" type="date" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_time')}</label>
          <input id="eventTime" type="time" class="form-input">
        </div>
        <button class="btn btn-primary" onclick="saveCalendarEvent()">${t('btn_save_event')}</button>
      </div>
    </div>

    <div class="modal-overlay" id="reminderModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>${t('h_add_reminder')}</h3>
          <button class="modal-close" onclick="closeModal('reminderModal')">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_reminder_title')}</label>
          <input id="reminderTitle" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_description')}</label>
          <textarea id="reminderDescription" class="form-textarea"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">${t('th_date')}</label>
          <input id="reminderDate" type="date" class="form-input">
        </div>
        <div style="display:flex;gap:10px;">
          <div class="form-group" style="flex:1;">
            <label class="form-label">${t('lbl_start_time')}</label>
            <input id="reminderStart" type="time" class="form-input">
          </div>
          <div class="form-group" style="flex:1;">
            <label class="form-label">${t('lbl_end_time')}</label>
            <input id="reminderEnd" type="time" class="form-input">
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveReminder()">${t('btn_save_reminder')}</button>
      </div>
    </div>
  `;
}

function changeCalendarMonth(delta) {
  calendarViewDate.setMonth(calendarViewDate.getMonth() + delta);
  renderCalendarUI(document.getElementById('pageContent'));
}

function openEventModal(eventId, prefillDate) {
  editingEventId = eventId || null;
  const ev = eventId ? calendarEventsCache.find(e => e.EventID === eventId) : null;
  document.getElementById('eventModalTitle').textContent = ev ? t('h_edit_event') : t('h_add_event');
  document.getElementById('eventTitle').value = ev ? ev.Title : '';
  document.getElementById('eventDescription').value = ev ? (ev.Description || '') : '';
  const now = new Date();
  document.getElementById('eventDate').value = ev ? ev.EventDate : (prefillDate || calDateKey(now.getFullYear(), now.getMonth(), now.getDate()));
  document.getElementById('eventTime').value = ev ? (ev.EventTime || '') : '';
  openModal('eventModal');
}

async function saveCalendarEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const description = document.getElementById('eventDescription').value.trim();
  const eventDate = document.getElementById('eventDate').value;
  const eventTime = document.getElementById('eventTime').value;
  if (!title || !eventDate) return showToast(t('err_event_required'), 'error');

  const url = editingEventId ? '/api/admin/calendar-events/' + editingEventId : '/api/admin/calendar-events';
  const method = editingEventId ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers: getHeaders(), body: JSON.stringify({ title, description, eventDate, eventTime }) });
  if (r.ok) {
    closeModal('eventModal');
    showToast(editingEventId ? t('toast_updated') : t('toast_created'), 'success');
    renderCalendar(document.getElementById('pageContent'));
  } else {
    showToast(t('toast_failed'), 'error');
  }
}

async function deleteCalendarEvent(id) {
  if (!confirm(t('confirm_delete_event'))) return;
  const r = await fetch('/api/admin/calendar-events/' + id, { method: 'DELETE', headers: getHeaders() });
  if (r.ok) { showToast(t('toast_deleted'), 'info'); renderCalendar(document.getElementById('pageContent')); }
  else showToast(t('toast_failed'), 'error');
}

function openReminderModal() {
  document.getElementById('reminderTitle').value = '';
  document.getElementById('reminderDescription').value = '';
  const now = new Date();
  document.getElementById('reminderDate').value = calDateKey(now.getFullYear(), now.getMonth(), now.getDate());
  document.getElementById('reminderStart').value = '';
  document.getElementById('reminderEnd').value = '';
  openModal('reminderModal');
}

async function saveReminder() {
  const title = document.getElementById('reminderTitle').value.trim();
  const description = document.getElementById('reminderDescription').value.trim();
  const reminderDate = document.getElementById('reminderDate').value;
  const startTime = document.getElementById('reminderStart').value;
  const endTime = document.getElementById('reminderEnd').value;
  if (!title) return showToast(t('err_reminder_required'), 'error');

  const r = await fetch('/api/reminders', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ title, description, reminderDate, startTime, endTime }) });
  if (r.ok) {
    closeModal('reminderModal');
    showToast(t('toast_created'), 'success');
    renderCalendar(document.getElementById('pageContent'));
  } else {
    showToast(t('toast_failed'), 'error');
  }
}

async function toggleReminder(id, completed) {
  await fetch('/api/reminders/' + id + '/toggle', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ completed }) });
  renderCalendar(document.getElementById('pageContent'));
}

async function deleteReminderItem(id) {
  if (!confirm(t('confirm_delete_reminder'))) return;
  await fetch('/api/reminders/' + id, { method: 'DELETE', headers: getHeaders() });
  showToast(t('toast_deleted'), 'info');
  renderCalendar(document.getElementById('pageContent'));
}

        </div>
        <div class="stat-card">
          <div class="stat-icon green">📢</div>
          <div class="stat-info"><h3>${achievements.filter(a=>a.Status==='published').length}</h3><p>${t('lbl_published')}</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div class="stat-info"><h3>${stats.totalTeams || 0}</h3><p>${t('lbl_teams')}</p></div>
        </div>

          <div class="stat-icon amber">💬</div>
          <div class="stat-info"><h3>${myFeedbackCount}</h3><p>${t('lbl_feedback_given')}</p></div>

        </select>
      </div>

      <div id="overviewTeamSections"></div>`;

    renderOverviewTeamSections();
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${t('err_data')}</h3><p>${t('err_server')}</p></div>`;
  }
}

function renderOverviewTeamSections() {
  const container = document.getElementById('overviewTeamSections');
  if (!container) return;
  const filterVal = document.getElementById('overviewTeamFilter')?.value || '';

  const byTeam = {};
  overviewAchievements.forEach(a => {
    (byTeam[a.TeamID] = byTeam[a.TeamID] || []).push(a);
  });

  if (filterVal) {
    const tm = overviewTeams.find(t => String(t.TeamID) === filterVal);
    const items = byTeam[filterVal] || [];
    container.innerHTML = `
      <div class="full-panel">
        <div class="panel-header"><h3>${escHtml(tm?.TeamName || '')}</h3><span class="badge badge-blue">${items.length}</span></div>
        ${items.length
          ? `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;">${items.map(renderTeamPostCard).join('')}</div>`
          : `<p class="text-muted" style="font-size:13px;">${t('no_ach_found')}</p>`}
      </div>`;
    return;
  }

  container.innerHTML = overviewTeams.map(tm => {
    const items = byTeam[tm.TeamID] || [];
    const scroll = items.length > 3;
    return `
      <div class="full-panel" style="margin-bottom:20px;">
        <div class="panel-header"><h3>${escHtml(tm.TeamName)}</h3><span class="badge badge-blue">${items.length}</span></div>
        ${items.length
          ? `<div style="display:flex;gap:14px;${scroll ? 'overflow-x:auto;padding-bottom:8px;' : ''}">${items.map(a => `<div style="flex:${scroll ? '0 0 calc((100% - 28px)/3)' : '1'};min-width:260px;">${renderTeamPostCard(a)}</div>`).join('')}</div>`
          : `<p class="text-muted" style="font-size:13px;">${t('no_ach_found')}</p>`}
      </div>`;
  }).join('') || `<div class="empty-state"><p>${t('no_ach_found')}</p></div>`;
}

function filterAndRender() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const tid = document.getElementById('teamFilter')?.value;
  let filtered = allAchievements;
  if (q) filtered = filtered.filter(a => a.Title.toLowerCase().includes(q) || (a.Description || '').toLowerCase().includes(q));
  if (tid) filtered = filtered.filter(a => String(a.TeamID) === tid);

  const list = document.getElementById('achievementsList');
  if (!list) return;
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🏆</div><h3>${t('no_ach_found')}</h3><p>${t('adjust_search')}</p></div>`;
    return;
  }
  list.innerHTML = `<div class="ach-board">${filtered.map(a => renderAchCard(a)).join('')}</div>`;
  filtered.forEach(a => loadCardDetails(a.AchievementID));
}

async function loadCardDetails(id) {
  const DOC_ICON = { pdf:'📄', ppt:'📊', pptx:'📊', doc:'📝', docx:'📝' };
  try {
    const [detail, docs, feedback] = await Promise.all([
      fetch('/api/achievements/' + id).then(r => r.json()),
      fetch('/api/achievements/' + id + '/documents', { headers: getHeaders() }).then(r => r.ok ? r.json() : []),
      fetch('/api/supervisor/achievements/' + id + '/feedback', { headers: getHeaders() }).then(r => r.json())
    ]);

    // Images
    const imgsEl = document.getElementById(`card-imgs-${id}`);
    if (imgsEl && detail.images?.length) {
      imgsEl.innerHTML = detail.images.map(img =>
        `<img src="${escHtml(img.ImageURL)}" alt="" onclick="window.open(this.src)" onerror="this.parentElement.removeChild(this)">`
      ).join('');
    }

    // Documents
    const docsEl = document.getElementById(`card-docs-${id}`);
    if (docsEl && docs.length) {
      docsEl.innerHTML = docs.map(d => {
        const ext = d.FileName.split('.').pop().toLowerCase();
        const icon = DOC_ICON[ext] || '📎';
        return `<a class="ach-doc-chip" href="${escHtml(d.FilePath)}" target="_blank" download>${icon} ${escHtml(d.FileName)}</a>`;
      }).join('');
    }

    // Feedback
    renderFeedbackList(id, feedback);
  } catch (e) {
    const fbEl = document.getElementById(`card-fb-${id}`);
    if (fbEl) fbEl.innerHTML = '';
  }
}

function renderFeedbackList(id, feedback) {
  const el = document.getElementById(`card-fb-${id}`);
  if (!el) return;
  if (!feedback.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div style="font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;">🔒 ${t('lbl_supervisor_feedback')}</div>
    <div class="ach-fb-existing">
      ${feedback.map(f => `
        <div class="ach-fb-note">
          <div class="ach-fb-note-who">🎓 ${escHtml(f.AuthorName)} · ${fmtDate(f.CreatedAt)}</div>
          <div class="ach-fb-note-text">${escHtml(f.Content)}</div>
        </div>`).join('')}
    </div>`;
}

async function postFeedback(achievementId) {
  const input = document.getElementById(`fb-input-${achievementId}`);
  const btn = document.getElementById(`fb-btn-${achievementId}`);
  const content = input?.value?.trim();
  if (!content) return;

  btn.disabled = true; btn.textContent = t('posting');
  try {
    const r = await fetch(`/api/supervisor/achievements/${achievementId}/feedback`, {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ content })
    });
    if (r.ok) {
      showToast(t('feedback_posted'), 'success');
      input.value = '';
      const feedback = await fetch('/api/supervisor/achievements/' + achievementId + '/feedback', { headers: getHeaders() }).then(r => r.json());
      renderFeedbackList(achievementId, feedback);
    } else {
      showToast(t('feedback_fail'), 'error');
    }
  } catch (e) { showToast(t('toast_error'), 'error'); }
  finally { btn.disabled = false; btn.textContent = t('btn_post_feedback'); }
}

// ── MY FEEDBACK ───────────────────────────────────────────────────────────────
async function renderMyFeedback(el) {
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const [achievements, teams, myFeedback] = await Promise.all([
      fetch('/api/supervisor/achievements', { headers: getHeaders() }).then(r => r.json()),
      fetch('/api/teams').then(r => r.json()),
      fetch('/api/supervisor/my-feedback', { headers: getHeaders() }).then(r => r.json())
    ]);
    allAchievements = achievements;

    const teamOptions = teams.map(t =>
      `<option value="${t.TeamID}">${escHtml(t.TeamName)}</option>`
    ).join('');

    el.innerHTML = `
      <div class="page-header">
        <div><h2>${t('h_my_feedback')}</h2><p>${t('my_feedback_desc')}</p></div>
      </div>
      <div style="background:linear-gradient(135deg,#fef3c7,#fffbeb);border:1.5px solid #f59e0b;border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:#78350f;display:flex;gap:8px;align-items:center;">
        🔒 ${t('private_note_desc')}
      </div>
      <div class="search-filters" style="margin-bottom:14px;">
        <input class="search-input" id="searchInput" placeholder="${t('search_ph')}" oninput="filterAndRender()">
        <select class="filter-select" id="teamFilter" onchange="filterAndRender()">
          <option value="">${t('all_teams_opt')}</option>
          ${teamOptions}
        </select>
      </div>
      <div id="achievementsList"></div>

      <div class="full-panel" style="margin-top:24px;">
        <div class="panel-header"><h3>${t('h_my_feedback_history')}</h3></div>
        ${myFeedback.length ? myFeedback.map(f => `
          <div style="padding:16px 0;border-bottom:1px solid var(--border);">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">${t('on_achievement')} <strong>${escHtml(f.AchievementTitle)}</strong> · ${escHtml(f.TeamName || '')} · ${fmtDate(f.CreatedAt)}</div>
            <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;">
              <div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:4px;">🔒 ${t('lbl_supervisor_feedback')}</div>
              <div style="font-size:14px;color:#374151;">${escHtml(f.Content)}</div>
            </div>
          </div>`).join('') + '<style>div[style*="border-bottom"]:last-child{border-bottom:none;}</style>'
        : `<div class="empty-state"><div class="empty-icon">💬</div><h3>${t('no_my_feedback')}</h3></div>`}
      </div>`;

    filterAndRender();
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${t('err_data')}</h3></div>`;
  }
}

// ── SETTINGS ───────────────────────────────────────────────────────────────────
function renderSettings(el) {
  const settingCard = (icon, title, desc, onclick) => `
    <div class="settings-icon-card" onclick="${onclick}" style="cursor:pointer;border:1px solid var(--border);border-radius:14px;padding:22px 18px;text-align:center;transition:box-shadow .15s,transform .15s;">
      <div style="width:48px;height:48px;border-radius:50%;background:#dce8f5;color:#3d5a7d;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:18px;">
        <i class="fa-solid ${icon}"></i>
      </div>
      <h4 style="margin:0 0 4px;font-size:14px;">${title}</h4>
      <p class="text-muted" style="margin:0;font-size:12px;">${desc}</p>
    </div>`;

  const initial = (currentUser?.Name || 'S').trim().charAt(0).toUpperCase();

  el.innerHTML = `
    <div class="page-header">
      <div><h2>${t('nav_settings')}</h2><p>${t('sub_settings')}</p></div>
    </div>

    <div class="full-panel" style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
      <div style="position:relative;flex-shrink:0;">
        <div style="width:88px;height:88px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#4a7099,#355a7d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;">
          ${currentUser?.ProfilePicture ? `<img src="${escHtml(currentUser.ProfilePicture)}" style="width:100%;height:100%;object-fit:cover;">` : initial}
        </div>
      </div>
      <div style="flex:1;min-width:220px;">
        <h3 style="margin:0 0 4px;">${escHtml(currentUser?.Name || '')}</h3>
        <p class="text-muted" style="margin:0 0 14px;font-size:13px;">${escHtml(currentUser?.Email || '')}</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;font-size:13px;">
          <div><span class="text-muted">${t('lbl_phone')}</span><br><strong>${escHtml(currentUser?.Phone || t('not_set'))}</strong></div>
          <div><span class="text-muted">${t('lbl_role')}</span><br><strong>${escHtml(currentUser?.Role || '')}</strong></div>
        </div>
      </div>
    </div>

    <div class="full-panel">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;">
        ${settingCard('fa-id-card', t('settings_profile'), t('settings_profile_desc'), "openModal('profileModal')")}
        ${settingCard('fa-lock', t('settings_password'), t('settings_password_desc'), "openModal('passwordModal')")}
        ${settingCard('fa-globe', t('settings_language'), t('settings_language_desc'), "toggleLang()")}
        ${settingCard(document.body.classList.contains('dark-mode') ? 'fa-sun' : 'fa-moon', t('settings_theme'), document.body.classList.contains('dark-mode') ? t('settings_theme_desc_dark') : t('settings_theme_desc_light'), "toggleTheme()")}
      </div>
    </div>

    <div class="modal-overlay" id="profileModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>${t('settings_profile')}</h3>
          <button class="modal-close" onclick="closeModal('profileModal')">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_full_name')}</label>
          <input id="profileName" class="form-input" value="${escHtml(currentUser?.Name || '')}">
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_email')}</label>
          <input id="profileEmail" type="email" class="form-input" value="${escHtml(currentUser?.Email || '')}">
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_phone')}</label>
          <input id="profilePhone" class="form-input" value="${escHtml(currentUser?.Phone || '')}">
        </div>
        <button class="btn btn-primary" onclick="saveProfile()">${t('btn_save')}</button>
      </div>
    </div>

    <div class="modal-overlay" id="passwordModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>${t('settings_password')}</h3>
          <button class="modal-close" onclick="closeModal('passwordModal')">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_new_password')}</label>
          <input id="newPassword" type="password" class="form-input" placeholder="${t('password_hint')}">
        </div>
        <button class="btn btn-primary" onclick="savePassword()">${t('btn_save')}</button>
      </div>
    </div>`;
}

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark-mode');
  localStorage.setItem('interntrack_theme', isDark ? 'dark' : 'light');
  renderSettings(document.getElementById('pageContent'));
}

async function saveProfile() {
  const name = document.getElementById('profileName').value.trim();
  const email = document.getElementById('profileEmail').value.trim();
  const phone = document.getElementById('profilePhone').value.trim();
  if (!name || !email) return showToast(t('err_name_email'), 'error');

  const r = await fetch('/api/profile', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ name, email, phone }) });
  if (r.ok) {
    const data = await r.json();
    currentUser.Name = data.name;
    currentUser.Email = data.email;
    currentUser.Phone = data.phone;
    const nameEl = document.getElementById('supervisorName');
    if (nameEl) nameEl.textContent = data.name;
    closeModal('profileModal');
    renderSettings(document.getElementById('pageContent'));
    showToast(t('toast_updated'), 'success');
  } else {
    const d = await r.json();
    showToast(d.error || t('toast_failed'), 'error');
  }
}

async function savePassword() {
  const password = document.getElementById('newPassword').value;
  if (!password || password.length < 6) return showToast(t('err_password_length'), 'error');

  const r = await fetch('/api/profile', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ password }) });
  if (r.ok) {
    document.getElementById('newPassword').value = '';
    closeModal('passwordModal');
    showToast(t('toast_password_updated'), 'success');
  } else {
    const d = await r.json();
    showToast(d.error || t('toast_failed'), 'error');
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  const savedLang = localStorage.getItem('interntrack_lang') || 'en';
  currentLang = savedLang;
  document.getElementById('langBtn').textContent = savedLang === 'ar' ? 'English' : 'عربي';
  applyTranslations();

  try {
    const r = await fetch('/api/auth/me', { headers: getHeaders() });
    if (!r.ok) throw new Error('auth');
    currentUser = await r.json();
    // Handle both capitalizations (Role from DB, role from token fallback)
    const userRole = currentUser.Role || currentUser.role;
    if (userRole !== 'Supervisor') {
      window.location.href = '/login.html';
      return;
    }
    document.getElementById('supervisorName').textContent = currentUser.Name || currentUser.name || 'Supervisor';
  } catch (e) {
    window.location.href = '/login.html';
    return;
  }
  switchTab(localStorage.getItem('supervisorCurrentTab') || 'overview');
})();
</script>
