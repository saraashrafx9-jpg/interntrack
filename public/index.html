function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('interntrack_lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = lang === 'ar' ? 'English' : 'عربي';
  applyTranslations();
  navigate(currentPage);
}

function toggleLang() { setLang(currentLang === 'en' ? 'ar' : 'en'); }

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function getToken() {
  const c = document.cookie.split(';').find(c => c.trim().startsWith('token='));
  return c ? c.trim().slice(6) : localStorage.getItem('token');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3000);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }

function fmtDate(d) {
  if (!d) return '—';
  const s = String(d).replace(' ', 'T');
  const dt = new Date(s);
  const locale = currentLang === 'ar' ? 'ar-AE' : 'en-US';
  return isNaN(dt) ? String(d) : dt.toLocaleDateString(locale, { month:'short', day:'numeric', year:'numeric' });
}

}

function setActiveNav(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const map = { home: 0, teams: 1, achievements: 2 };
  const items = document.querySelectorAll('.nav-item');
  if (page in map) items[map[page]]?.classList.add('active');
  const titles = {
    home:         t('tb_dashboard'),
    teams:        t('tb_groups'),
    achievements: t('tb_achievements'),
    login:        t('tb_login')
  };
  document.getElementById('topbarTitle').textContent = titles[page] || 'InternTrack';
}

function updateAuthUI() {
  const loginBtn    = document.getElementById('loginSidebarBtn');
  const logoutBtn   = document.getElementById('logoutSidebarBtn');
  const userCard    = document.getElementById('sidebarUserCard');
  const dashSection = document.getElementById('dashboardSection');
  const dashNav     = document.getElementById('dashboardNavItem');
  const topbarUser  = document.getElementById('topbarUser');

  if (currentUser) {
    loginBtn.style.display  = 'none';
    logoutBtn.style.display = 'block';
    userCard.style.display  = 'flex';
    document.getElementById('sidebarUserName').textContent = currentUser.Name || currentUser.name || currentUser.email;
    document.getElementById('sidebarUserRole').textContent = currentUser.Role || currentUser.role;
    dashSection.style.display = 'block';
    dashNav.style.display     = 'flex';
    dashNav.querySelector('.nav-icon').textContent =
      (currentUser.Role || currentUser.role) === 'Admin' ? '⚙️' : '📊';
    topbarUser.style.display = 'inline-block';
    topbarUser.textContent   =
      (currentUser.Name || currentUser.name || currentUser.email) +
      ' · ' + (currentUser.Role || currentUser.role);
  } else {
    loginBtn.style.display  = 'block';
    logoutBtn.style.display = 'none';
    userCard.style.display  = 'none';
    dashSection.style.display = 'none';
    dashNav.style.display     = 'none';
    topbarUser.style.display  = 'none';
  }
}

function goToDashboard() {
  const role = currentUser?.Role || currentUser?.role;
  if      (role === 'Admin')      window.location.href = '/admin-dashboard.html';
  else if (role === 'Leader')     window.location.href = '/leader-dashboard.html';
  else if (role === 'Supervisor') window.location.href = '/supervisor-dashboard.html';
  else if (role === 'Student')    window.location.href = '/student-dashboard.html';
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function checkAuth() {
  const token = getToken();
  if (!token) { updateAuthUI(); return; }
  try {
    const r = await fetch('/api/auth/me', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (r.ok) {
      currentUser = await r.json();
    } else {
      localStorage.removeItem('token');
      document.cookie = 'token=;max-age=0;path=/';
    }
  } catch(e) {}
  updateAuthUI();
}

async function logout() {
  try { await fbAuth.signOut(); } catch(e) {}
  await fetch('/api/auth/logout', { method: 'POST' });
  document.cookie = 'token=;max-age=0;path=/';
  localStorage.removeItem('token');
  currentUser = null;
  updateAuthUI();
  navigate('home');
  showToast(t('logged_out'), 'info');
}

// ── LOGIN HANDLER ─────────────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn      = document.querySelector('#loginForm button[type="submit"]');
  const errEl    = document.getElementById('loginError');

  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = t('signing_in');

  try {
    const credential = await fbAuth.signInWithEmailAndPassword(email, password);
    const idToken = await credential.user.getIdToken();
    const r = await fetch('/api/auth/session', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ idToken })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Session creation failed');

    // If a role tile was selected, verify it matches the actual role
    const actualRole = data.user?.role;
    if (selectedLoginRole && actualRole && actualRole !== selectedLoginRole) {
      await fbAuth.signOut();
      const roleNames = {
        Admin: t('role_admin'), Leader: t('role_leader'),
        Student: t('role_student'), Supervisor: t('role_supervisor')
      };
      errEl.textContent = currentLang === 'ar'
        ? `هذا الحساب مسجل كـ "${roleNames[actualRole] || actualRole}"، وليس كـ "${roleNames[selectedLoginRole] || selectedLoginRole}".`
        : `This account is registered as "${roleNames[actualRole] || actualRole}", not "${roleNames[selectedLoginRole] || selectedLoginRole}".`;
      btn.disabled = false;
      btn.textContent = t('sign_in_btn');
      return;
    }

    document.cookie = `token=${idToken};path=/;max-age=3600;sameSite=lax`;
    localStorage.setItem('token', idToken);
    currentUser = data.user;
    updateAuthUI();
    showToast(t('welcome'), 'success');
    window.location.href = data.redirectUrl;

  } catch (err) {
    const firebaseErrors = {
      'auth/user-not-found':         t('fe_not_found'),
      'auth/wrong-password':         t('fe_wrong_pw'),
      'auth/invalid-credential':     t('fe_invalid'),
      'auth/invalid-email':          t('fe_bad_email'),
      'auth/too-many-requests':      t('fe_too_many'),
      'auth/user-disabled':          t('fe_disabled'),
      'auth/network-request-failed': t('fe_network')
    };
    const msg = firebaseErrors[err.code] || err.message || t('fe_generic');
    errEl.textContent = msg;
    btn.disabled = false;
    btn.textContent = t('sign_in_btn');
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
async function navigate(page) {
  currentPage = page;
  setActiveNav(page);
  const content = document.getElementById('pageContent');
switch(page) {

  case 'teams':
    await renderTeams(content);
    break;

  case 'achievements':
    await renderAchievements(content);
    break;

  case 'login':
    renderLogin(content);
    break;

  default:
    renderLogin(content);
}

  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {

      fetch('/api/statistics').then(r=>r.json()),

    allTeams = teams;
    allAchievements = achievements;

        <p>${t.AchievementCount||0} ${window.t('posts')}</p>
      </div>`).join('');

    const recentItems = achievements.slice(0,5).map((a,i) => {

          <div class="achievement-info">

            <p>${escHtml(a.TeamName||window.t('general'))} · ${window.t('by')} ${escHtml(a.CreatorName||'')}</p>

            <button class="btn-hero-primary" onclick="navigate('teams')">${window.t('view_groups')}</button>

        </div>
        <div class="stat-card">
          <div class="stat-icon gold">🏆</div>
          <div class="stat-info"><h3>${stats.totalAchievements||0}</h3><p>${window.t('stat_achievements')}</p><small>${window.t('stat_total')}</small></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">👥</div>
          <div class="stat-info"><h3>${stats.totalLeaders||0}</h3><p>${window.t('stat_leaders')}</p><small>${window.t('stat_across')}</small></div>

        <div class="stat-card">
          <div class="stat-icon purple">📅</div>
          <div class="stat-info"><h3>16</h3><p>${window.t('stat_weeks')}</p><small>${window.t('stat_duration')}</small></div>
        </div>
      </div>

      <div class="content-grid">
        <div class="panel">
          <div class="panel-header">

            <a onclick="navigate('teams')">${window.t('view_all')}</a>
          </div>
          <div class="groups-grid">${groupCards || `<p class="text-muted">${window.t('no_teams_h')}</p>`}</div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h3>${window.t('latest_ach')}</h3>

// ── TEAMS PAGE ────────────────────────────────────────────────────────────────
async function renderTeams(el) {
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const teams = await fetch('/api/teams').then(r=>r.json());
    allTeams = teams;
    const icons = ['/images/coding.png','/images/IS.png','/images/www.png','/images/data.png','/images/media.png','/images/business.png','/images/atten.png'];

    const cards = teams.map((t,i) => `
      <div class="achievement-card-full" onclick="filterByTeam(${t.TeamID}, '${escHtml(t.TeamName)}')">
        <div class="card-image" style="background:linear-gradient(135deg,#dbeafe,#3b82f6);">
          <img src="${icons[i%icons.length]}" style="width:80px;height:80px;object-fit:contain;" onerror="this.parentElement.innerHTML='👥'">
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(t.TeamName)}</div>
          <div class="card-desc">${escHtml(t.Description||window.t('team_default_desc'))}</div>
          <div class="card-meta">
            <span class="badge badge-blue">👥 ${t.LeaderName||window.t('no_leader')}</span>
            <span>${t.AchievementCount||0} ${window.t('stat_achievements')}</span>
          </div>
        </div>
      </div>`).join('') || `<div class="empty-state"><div class="empty-icon">👥</div><h3>${window.t('no_teams_h')}</h3><p>${window.t('teams_empty')}</p></div>`;

    el.innerHTML = `
      <div class="page-header">
        <div><h2>${window.t('teams_title')}</h2><p>${window.t('teams_sub')}</p></div>
      </div>
      <div class="achievement-cards-grid">${cards}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${window.t('err_teams')}</h3></div>`;
  }
}

async function filterByTeam(teamId, teamName) {
  currentPage = 'achievements';
  setActiveNav('achievements');
  const el = document.getElementById('pageContent');
  await renderAchievements(el, teamId, teamName);
}

// ── ACHIEVEMENTS PAGE ─────────────────────────────────────────────────────────
async function renderAchievements(el, filterTeamId, filterTeamName) {
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const [achievements, teams] = await Promise.all([
      fetch('/api/achievements').then(r=>r.json()),
      fetch('/api/teams').then(r=>r.json())
    ]);
    allAchievements = achievements;
    allTeams = teams;

    const teamOptions = teams.map(t =>
      `<option value="${t.TeamID}" ${filterTeamId==t.TeamID?'selected':''}>${escHtml(t.TeamName)}</option>`
    ).join('');

    el.innerHTML = `
      <div class="page-header">
        <div><h2>${window.t('ach_title')}</h2><p>${achievements.length} ${window.t('total_ach')}${filterTeamName?' '+window.t('filtered')+' '+escHtml(filterTeamName):''}</p></div>
      </div>
      <div class="achievements-page">
        <div class="search-filters">
          <input class="search-input" id="searchInput" placeholder="${window.t('search_ph')}" oninput="filterAchievements()">
          <select class="filter-select" id="teamFilter" onchange="filterAchievements()">
            <option value="">${window.t('all_teams_opt')}</option>
            ${teamOptions}
          </select>
        </div>
        <div class="achievement-cards-grid" id="achievementsGrid"></div>
      </div>`;

    if (filterTeamId) document.getElementById('teamFilter').value = filterTeamId;
    filterAchievements();
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${window.t('err_ach')}</h3></div>`;
  }
}

function filterAchievements() {
  const q   = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const tid = document.getElementById('teamFilter')?.value;
  let filtered = allAchievements;
  if (q)   filtered = filtered.filter(a => a.Title.toLowerCase().includes(q) || (a.Description||'').toLowerCase().includes(q) || (a.TeamName||'').toLowerCase().includes(q));
  if (tid) filtered = filtered.filter(a => String(a.TeamID) === tid);

  const grid = document.getElementById('achievementsGrid');
  if (!grid) return;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🏆</div><h3>${window.t('no_ach_found')}</h3><p>${window.t('adjust_search')}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(a => `
    <div class="achievement-card-full" onclick="viewAchievement(${a.AchievementID})">
      ${a.FirstImage
        ? `<img class="card-image" src="${escHtml(a.FirstImage)}" style="width:100%;height:180px;object-fit:cover;" onerror="this.outerHTML='<div class=\'card-image\' style=\'background:linear-gradient(135deg,${randomGradient(a.AchievementID)})\'>🏆</div>'">`
        : `<div class="card-image" style="background:linear-gradient(135deg,${randomGradient(a.AchievementID)});">🏆</div>`}
      <div class="card-body">
        <div class="card-title">${escHtml(a.Title)}</div>
        <div class="card-desc">${escHtml(a.Description)}</div>
        <div class="card-meta">
          <span class="badge badge-blue">${escHtml(a.TeamName||window.t('general'))}</span>
          <span>${fmtDate(a.CreatedAt)}</span>
        </div>
      </div>
    </div>`).join('');
}

function randomGradient(id) {
  const g = ['#dbeafe,#3b82f6','#fef3c7,#f59e0b','#d1fae5,#10b981','#ede9fe,#8b5cf6','#fce7f3,#ec4899'];
  return g[id % g.length];
}

// ── ACHIEVEMENT DETAIL ────────────────────────────────────────────────────────
async function viewAchievement(id) {
  try {
    const a = await fetch('/api/achievements/' + id).then(r=>r.json());
    document.getElementById('modalTitle').textContent = a.Title;

    const imagesHtml = a.images?.length ? `
      <div class="detail-image-gallery">
        ${a.images.map(img => `<img src="${escHtml(img.ImageURL)}" alt="Achievement image" onclick="window.open(this.src)" onerror="this.style.display='none'">`).join('')}
      </div>` : '';

    const commentsHtml = a.comments?.length
      ? a.comments.map(c => `
          <div class="comment-box">
            <div class="comment-author">${escHtml(c.AuthorName)}</div>
            <div class="comment-text">${escHtml(c.Content)}</div>
            <div class="comment-time">${fmtDate(c.CreatedAt)}</div>
          </div>`).join('')
      : `<p class="text-muted">${window.t('no_comments')}</p>`;

    document.getElementById('modalBody').innerHTML = `
      <div class="flex gap-2 items-center mb-2" style="flex-wrap:wrap;">
        <span class="badge badge-blue">${escHtml(a.TeamName||window.t('general'))}</span>
        <span class="text-muted">${window.t('by')} ${escHtml(a.CreatorName||'')}</span>
        <span class="text-muted">${fmtDate(a.CreatedAt)}</span>
      </div>
      ${imagesHtml}
      <div style="white-space:pre-wrap;line-height:1.8;font-size:15px;margin-bottom:20px;">${escHtml(a.Description)}</div>
      <div class="flex gap-2 mb-2" style="padding-top:14px;border-top:1px solid var(--border);">
        <button class="btn btn-ghost btn-sm" onclick="toggleLike(${id})">❤️ ${window.t('like')} (${a.likeCount||0})</button>
      </div>
      <h4 style="margin-bottom:12px;font-family:'Plus Jakarta Sans',sans-serif;">${window.t('comments_lbl')} (${a.comments?.length||0})</h4>
      <form id="commentForm" onsubmit="addComment(event,${id})" style="margin-bottom:16px;">
        <div class="form-group">
          <input type="text" id="commentAuthor" class="form-input" placeholder="${window.t('name_ph')}" required>
        </div>
        <div class="form-group">
          <textarea id="commentContent" class="form-textarea" style="min-height:80px;" placeholder="${window.t('comment_ph')}" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-sm">${window.t('post_comment')}</button>
      </form>
      <div id="commentsList">${commentsHtml}</div>`;

    openModal('achievementModal');
  } catch(e) {
    showToast(window.t('load_fail'), 'error');
  }
}

async function toggleLike(id) {
  try {
    const r = await fetch('/api/achievements/'+id+'/like', { method:'POST', headers:{'Content-Type':'application/json'} });
    if (r.ok) viewAchievement(id);
  } catch(e) {}
}

async function addComment(e, id) {
  e.preventDefault();
  const authorName = document.getElementById('commentAuthor').value;
  const content    = document.getElementById('commentContent').value;
  try {
    const r = await fetch('/api/achievements/'+id+'/comments', {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({ authorName, content })
    });
    if (r.ok) { showToast(window.t('comment_added'),'success'); viewAchievement(id); }
    else showToast(window.t('comment_fail'),'error');
  } catch(e) { showToast(window.t('toast_error'),'error'); }
}

// ── LOGIN PAGE ────────────────────────────────────────────────────────────────
let selectedLoginRole = null;

function renderLogin(el) {
  selectedLoginRole = null;
  el.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:center;min-height:calc(100vh - 160px);padding:32px 16px;">
      <div style="width:100%;max-width:480px;">

        <!-- Role selector card -->
        <div id="roleSelectCard" style="background:var(--card-bg);border-radius:24px;padding:36px 32px;box-shadow:var(--shadow-lg);border:1px solid var(--border);margin-bottom:16px;">
          <div style="text-align:center;margin-bottom:24px;">
            <img src="/images/logo.png" style="width:52px;border-radius:12px;" onerror="this.style.display='none'">
            <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;margin-top:10px;">InternTrack</h1>
            <p style="font-size:14px;color:var(--text-muted);margin-top:4px;" id="roleSelectTitle">${window.t('role_select_title')}</p>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="roleGrid">
            ${[
              { key:'Admin',      icon:'⚙️', labelKey:'role_admin',      hintKey:'role_hint_admin'      },
              { key:'Leader',     icon:'👤', labelKey:'role_leader',     hintKey:'role_hint_leader'     },
              { key:'Student',    icon:'🎓', labelKey:'role_student',    hintKey:'role_hint_student'    },
              { key:'Supervisor', icon:'👁️', labelKey:'role_supervisor', hintKey:'role_hint_supervisor' }
            ].map(r => `
              <button onclick="selectRole('${r.key}')" id="roleBtn_${r.key}"
                style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px 12px;border:2px solid var(--border);border-radius:14px;background:var(--card-bg);cursor:pointer;transition:all .18s;font-family:inherit;">
                <span style="font-size:26px;">${r.icon}</span>
                <span style="font-weight:700;font-size:13px;color:var(--text);">${window.t(r.labelKey)}</span>
                <span style="font-size:11px;color:var(--text-muted);text-align:center;">${window.t(r.hintKey)}</span>
              </button>`).join('')}
          </div>
        </div>

        <!-- Login form — hidden until role selected -->
        <div id="loginFormCard" style="background:var(--card-bg);border-radius:24px;padding:32px;box-shadow:var(--shadow-lg);border:1px solid var(--border);display:none;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
            <button onclick="resetRoleSelect()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;color:var(--text-muted);">← ${window.t('btn_login').split('/')[0].trim()}</button>
            <span id="selectedRoleLabel" style="font-weight:700;font-size:15px;"></span>
          </div>

          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label">${window.t('email_lbl')}</label>
              <input type="email" id="loginEmail" class="form-input" placeholder="${window.t('email_ph')}" required>
            </div>
            <div class="form-group">
              <label class="form-label">${window.t('pass_lbl')}</label>
              <input type="password" id="loginPassword" class="form-input" placeholder="${window.t('pass_ph')}" required>
            </div>
            <p id="loginError" style="color:#ef4444;font-size:13px;margin-bottom:12px;min-height:18px;"></p>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;font-size:15px;border-radius:12px;justify-content:center;">
              ${window.t('sign_in_btn')}
            </button>
            <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;">
              ${window.t('admin_hint')}
            </p>
          </form>
        </div>

      </div>
    </div>`;
}

function selectRole(role) {
  selectedLoginRole = role;
  // Highlight selected tile
  ['Admin','Leader','Student','Supervisor'].forEach(r => {
    const btn = document.getElementById('roleBtn_' + r);
    if (!btn) return;
    if (r === role) {
      btn.style.borderColor = '#2563eb';
      btn.style.background = '#eff6ff';
      btn.style.transform = 'scale(1.03)';
    } else {
      btn.style.borderColor = 'var(--border)';
      btn.style.background = 'var(--card-bg)';
      btn.style.transform = '';
    }
  });
  // Show form after short delay
  setTimeout(() => {
    document.getElementById('roleSelectCard').style.display = 'none';
    const formCard = document.getElementById('loginFormCard');
    formCard.style.display = 'block';
    const roleLabels = {
      Admin: window.t('role_admin') + ' ⚙️',
      Leader: window.t('role_leader') + ' 👤',
      Student: window.t('role_student') + ' 🎓',
      Supervisor: window.t('role_supervisor') + ' 👁️'
    };
    document.getElementById('selectedRoleLabel').textContent = roleLabels[role] || role;
    document.getElementById('loginEmail').focus();
  }, 180);
}

function resetRoleSelect() {
  selectedLoginRole = null;
  document.getElementById('loginFormCard').style.display = 'none';
  document.getElementById('roleSelectCard').style.display = 'block';
  ['Admin','Leader','Student','Supervisor'].forEach(r => {
    const btn = document.getElementById('roleBtn_' + r);
    if (btn) { btn.style.borderColor = 'var(--border)'; btn.style.background = 'var(--card-bg)'; btn.style.transform = ''; }
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  // Apply saved language on load
  const savedLang = localStorage.getItem('interntrack_lang') || 'en';
  currentLang = savedLang;
  document.getElementById('langBtn').textContent = savedLang === 'ar' ? 'English' : 'عربي';
  applyTranslations();

 await checkAuth();

if (currentUser) {
  goToDashboard();
} else {
  navigate('login');
}
})();
</script>
