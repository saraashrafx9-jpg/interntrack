<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InTrack – SGMB Student Portal</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/InTrack-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/InTrack-16.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="InTrack">
  <link rel="apple-touch-icon" href="/images/InTrack-128.png">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script>
    (function() {
      const lang = localStorage.getItem('InTrack_lang') || 'en';
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    })();
  </script>
</head>
<body>
<script>if (localStorage.getItem('InTrack_theme') === 'dark') document.body.classList.add('dark-mode');</script>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <img src="/images/InTrack-128.png" alt="InTrack" onerror="this.style.display='none'">
    <div class="sidebar-brand-text">
      <h2>InTrack</h2>
      <p data-i18n="student_portal">Student Portal</p>
    </div>
  </div>
<nav class="sidebar-nav">
  <a href="#" class="nav-item active" data-page="overview" onclick="switchTab('overview')">
    <i class="fa-solid fa-gauge-high"></i>
    <span data-i18n="nav_overview">Dashboard</span>
  </a>

  <a href="#" class="nav-item" data-page="submit" onclick="switchTab('submit')">
    <i class="fa-regular fa-pen-to-square"></i>
    <span data-i18n="nav_submit">Weekly Summary</span>
  </a>

  <a href="#" class="nav-item" data-page="my" onclick="switchTab('my')">
    <i class="fa-solid fa-list-check"></i>
    <span data-i18n="nav_my_subs">My Submissions</span>
  </a>

  <a href="#" class="nav-item" data-page="calendar" onclick="switchTab('calendar')">
    <i class="fa-regular fa-calendar-days"></i>
    <span data-i18n="nav_calendar">Calendar</span>
  </a>

  <a href="#" class="nav-item" data-page="settings" onclick="switchTab('settings')">
    <i class="fa-solid fa-gear"></i>
    <span data-i18n="nav_settings">Settings</span>
  </a>
</nav>
<div class="help-card">
  <div class="help-icon">
    <i class="fa-solid fa-headset"></i>
  </div>

  <h3 data-i18n="need_help">Need Help?</h3>

  <p data-i18n="contact_admin_short">Contact admin.</p>

  <button class="help-btn" onclick="openHelpModal()" data-i18n="help_center">
    Help Center
  </button>
</div>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="sidebarAvatar" style="overflow:hidden;"><i class="fa-solid fa-user-graduate" style="font-size:15px;"></i></div>
      <div class="user-info">
        <strong id="studentName">Student</strong>
        <span id="studentTeam" style="display:inline-block;background:var(--primary);color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;">Student</span>
      </div>
    </div>
    <button class="sidebar-login-btn" style="background:#374151;margin-top:8px;" onclick="logout()" data-i18n="btn_signout">Sign Out</button>
  </div>
</aside>

<div class="main" id="mainLayout">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbarTitle" data-i18n="nav_overview">Dashboard</span>
    </div>
    <div class="topbar-right">
      <div style="position:relative;" id="notifWrapper">
        <button onclick="toggleNotifDropdown(event)" id="notifBtn" style="position:relative;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:5px 11px;cursor:pointer;font-size:15px;color:var(--text-muted);display:flex;align-items:center;gap:5px;">
          <i class="fa-solid fa-bell"></i>
          <span id="notifCount" style="display:none;background:#ef4444;color:#fff;border-radius:20px;min-width:18px;height:18px;font-size:10px;font-weight:700;align-items:center;justify-content:center;padding:0 4px;"></span>
        </button>
        <div id="notifDropdown" style="display:none;position:absolute;top:44px;right:0;width:320px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.15);z-index:9999;overflow:hidden;">
          <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <strong style="font-size:14px;">Notifications</strong>
            <button onclick="markAllNotifsRead()" style="font-size:11px;color:var(--primary);background:none;border:none;cursor:pointer;font-weight:600;">Mark all read</button>
          </div>
          <div id="notifList" style="max-height:360px;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;"></div>
        </div>
      </div>
    </div>
  </header>

  <div class="page-content" id="pageContent">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <footer class="footer">
    <p data-i18n="footer">© 2026 InTrack — Student Portal. All rights reserved.</p>
  </footer>
</div>

<div class="toast" id="toast"></div>

function t(k) { return T[currentLang]?.[k] ?? T.en[k] ?? k; }

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('InTrack_lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = lang === 'ar' ? 'English' : 'عربي';
  applyTranslations();
  switchTab(currentTabName);
}

function toggleLang() { setLang(currentLang === 'en' ? 'ar' : 'en'); }

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
}

new MutationObserver(mutations => {
  mutations.forEach(m => {
    m.addedNodes.forEach(node => {
      if (node.nodeType !== 1) return;
      if (node.dataset?.i18n) node.textContent = t(node.dataset.i18n);
      node.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
    });
  });
}).observe(document.documentElement, { childList: true, subtree: true });

// Real-time updates
let _suppressNextRefresh = false;
function suppressNextAutoRefresh() { _suppressNextRefresh = true; }
(function() {
  const es = new EventSource('/api/events');
  let _rt;
  es.onmessage = () => {
    if (_suppressNextRefresh) { _suppressNextRefresh = false; return; }
    clearTimeout(_rt);
    _rt = setTimeout(() => switchTab(currentTabName), 300);
  };
})();

  const c = document.cookie.split(';').find(c => c.trim().startsWith('token='));

function getHeaders(json=true) {
  const h = { Authorization: 'Bearer ' + token };
  if (json) h['Content-Type'] = 'application/json';

}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return '—';
  const s = String(d).replace(' ', 'T');
  const dt = new Date(s);
  const locale = currentLang === 'ar' ? 'ar-AE' : 'en-US';
  return isNaN(dt) ? d : dt.toLocaleDateString(locale, { month:'short', day:'numeric', year:'numeric' });
}

function switchTab(tab) {
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
  currentTabName = tab;
  localStorage.setItem('studentCurrentTab', tab);

  document.querySelectorAll('.sidebar-nav .nav-item').forEach(n => {
    n.classList.remove('active');
  });

  const activeItem = document.querySelector(`.sidebar-nav .nav-item[data-page="${tab}"]`);
  if (activeItem) activeItem.classList.add('active');

  const titles = {
    overview: t('tb_overview'),
    submit: editingId ? t('tb_edit') : t('tb_submit'),
    my: t('tb_my'),
    calendar: t('nav_calendar'),
    settings: t('nav_settings')
  };

  document.getElementById('topbarTitle').textContent = titles[tab] || t('nav_overview');

  const el = document.getElementById('pageContent');

  switch (tab) {
    case 'overview':
      renderOverview(el);
      break;

    case 'submit':
      renderSubmitForm(el);
      break;

    case 'my':
      renderMySubmissions(el);
      break;

    case 'calendar':
      renderCalendar(el);
      break;

    case 'settings':
      renderSettings(el);
      break;
  }
}

function renderCalendarUI(el) {
  const year = calendarViewDate.getFullYear();
  const month = calendarViewDate.getMonth();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const eventsByDate = {};
  calendarEventsCache.forEach(ev => {
    (eventsByDate[ev.EventDate] = eventsByDate[ev.EventDate] || []).push(ev);
  });

  const now = new Date();
  const todayKey = calDateKey(now.getFullYear(), now.getMonth(), now.getDate());

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
  const monthEvents = calendarEventsCache
    .filter(ev => ev.EventDate.startsWith(monthPrefix))

  el.innerHTML = `

function openEventModal(eventId, prefillDate) {
  if (!canManageCalendar()) return;
  editingEventId = eventId || null;
  const ev = eventId ? calendarEventsCache.find(e => e.EventID === eventId) : null;
  document.getElementById('eventModalTitle').textContent = ev ? t('h_edit_event') : t('h_add_event');
  editingEventPosterUrl = (ev && ev.EventPoster) ? ev.EventPoster : null;
  const posterFileEl = document.getElementById('eventPosterFile');
  if (posterFileEl) posterFileEl.value = '';
  const posterPrev = document.getElementById('eventPosterPreview');
  if (posterPrev) posterPrev.innerHTML = (ev && ev.EventPoster && ev.EventPoster.startsWith('/'))
    ? `<div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;"><img src="${ev.EventPoster}" style="height:60px;border-radius:6px;object-fit:cover;cursor:pointer;" onclick="openPosterModal('${ev.EventPoster}')"><div><div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">Current poster (click to preview)</div><button type="button" onclick="clearEventPoster()" class="btn btn-sm btn-danger">Remove</button></div></div>`
    : '';
  document.getElementById('eventTitle').value = ev ? ev.Title : '';
  document.getElementById('eventSpeakers').value = ev ? (ev.EventSpeakers || '') : '';
  document.getElementById('eventDescription').value = ev ? (ev.Description || '') : '';

  document.getElementById('eventDate').value = ev ? ev.EventDate : (prefillDate || calDateKey(now.getFullYear(), now.getMonth(), now.getDate()));
  document.getElementById('eventTime').value = ev ? (ev.EventTime || '') : '';
  document.getElementById('eventLocation').value = ev ? (ev.EventLocation || '') : '';
  openModal('eventModal');

function clearEventPoster() {

async function loadEventRequests() {
  if (!canManageCalendar()) return;
  const container = document.getElementById('eventRequestsContainer');
  if (!container) return;
  try {
    const requests = await fetch('/api/event-requests', { headers: getHeaders() }).then(r => r.json());
    if (!requests.length) { container.innerHTML = '<p class="text-muted" style="font-size:13px;">No event requests yet.</p>'; return; }
    container.innerHTML = `<div class="table-wrapper"><table>
      <thead><tr><th>Team</th><th>Event Name</th><th>Speaker</th><th>Date</th><th>Time</th><th>Description</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${requests.map(r => `<tr>
        <td>${escHtml(r.RequesterTeamName || r.RequesterName)}</td>
        <td><strong>${escHtml(r.EventName)}</strong></td>
        <td>${escHtml(r.EventSpeaker || '—')}</td>
        <td>${escHtml(r.EventDate)}</td>
        <td>${escHtml(r.EventTime || '—')}</td>
        <td style="max-width:160px;">${escHtml(r.Description || '—')}</td>
        <td><span style="padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;${r.Status==='pending'?'background:#fef3c7;color:#92400e;':r.Status==='accepted'?'background:#dcfce7;color:#15803d;':'background:#fee2e2;color:#991b1b;'}">${r.Status}</span></td>
        <td>${r.Status==='pending' ? `<div style="display:flex;gap:4px;">
          <button style="background:#16a34a;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;" onclick="reviewEventRequest(${r.RequestID},'accepted')">Accept</button>
          <button style="background:#dc2626;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;" onclick="reviewEventRequest(${r.RequestID},'declined')">Decline</button>
        </div>` : '—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } catch(e) { if (container) container.innerHTML = '<p class="text-muted" style="font-size:13px;">Failed to load requests.</p>'; }
}

async function reviewEventRequest(id, status) {
  const reviewNote = status === 'declined' ? (prompt('Reason for declining (optional):') || '') : '';
  try {
    const res = await fetch(`/api/event-requests/${id}`, {
      method: 'PUT', headers: getHeaders(),
      body: JSON.stringify({ status, reviewNote })
    });
    if (!res.ok) throw new Error();
    showToast(status === 'accepted' ? 'Request accepted!' : 'Request declined.', status === 'accepted' ? 'success' : 'info');
    loadEventRequests();
  } catch(e) { showToast('Failed to update request.', 'error'); }
}

async function saveCalendarEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const description = document.getElementById('eventDescription').value.trim();
  const eventDate = document.getElementById('eventDate').value;
  const eventTime = document.getElementById('eventTime').value;
  const eventSpeakers = document.getElementById('eventSpeakers').value.trim();
  const eventLocation = document.getElementById('eventLocation').value.trim();
  if (!title || !eventDate) return showToast(t('err_event_required'), 'error');
  let eventPoster = editingEventPosterUrl || '';
  const pFile = document.getElementById('eventPosterFile');
  if (pFile && pFile.files[0]) {
    const fd = new FormData(); fd.append('posterImage', pFile.files[0]);
    const up = await fetch('/api/upload-event-poster', { method: 'POST', headers: getHeaders(false), body: fd });
    if (up.ok) { const d = await up.json(); eventPoster = d.url; }
  }

  const url = editingEventId ? '/api/admin/calendar-events/' + editingEventId : '/api/admin/calendar-events';
  const method = editingEventId ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers: getHeaders(), body: JSON.stringify({ title, description, eventDate, eventTime, eventPoster, eventSpeakers, eventLocation }) });
  if (r.ok) {
    closeModal('eventModal');
    showToast(editingEventId ? t('toast_updated') : t('toast_created'), 'success');
    renderCalendar(document.getElementById('pageContent'));
  } else {
    showToast(t('toast_failed'), 'error');
  }
}

async function deleteCalendarEvent(id) {
  if (!confirm(t('confirm_delete_event'))) return;
  const r = await fetch('/api/admin/calendar-events/' + id, { method: 'DELETE', headers: getHeaders() });
  if (r.ok) { showToast(t('toast_deleted'), 'info'); renderCalendar(document.getElementById('pageContent')); }
  else showToast(t('toast_failed'), 'error');
}

async function saveReminder() {

async function saveProfile() {
  const name = document.getElementById('profileName').value.trim();
  const email = document.getElementById('profileEmail').value.trim();
  const phone = document.getElementById('profilePhone').value.trim();
  if (!name || !email) return showToast(t('err_name_email'), 'error');

  const r = await fetch('/api/profile', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ name, email, phone }) });
  if (r.ok) {
    const data = await r.json();
    currentUser.Name = data.name;
    currentUser.Email = data.email;
    currentUser.Phone = data.phone;
    const nameEl = document.getElementById('studentName');
    if (nameEl) nameEl.textContent = data.name;
    closeModal('profileModal');
    renderSettings(document.getElementById('pageContent'));
    showToast(t('toast_updated'), 'success');
  } else {
    const d = await r.json();
    showToast(d.error || t('toast_failed'), 'error');
  }
}

async function savePassword() {
  const password = document.getElementById('newPassword').value;
  if (!password || password.length < 6) return showToast(t('err_password_length'), 'error');

  const r = await fetch('/api/profile', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ password }) });
  if (r.ok) {
    document.getElementById('newPassword').value = '';
    closeModal('passwordModal');
    showToast(t('toast_password_updated'), 'success');
  } else {
    const d = await r.json();
    showToast(d.error || t('toast_failed'), 'error');
  }
}

function updateTodoCardDOM(userId) {
  const member = teamMembersCache.find(m => Number(m.UserID) === Number(userId));
  const cardEl = document.getElementById('todo-card-' + userId);
  if (member && cardEl) {
    cardEl.outerHTML = renderTodoCard(member);
    document.getElementById('ownTodoInput')?.focus();
  }
}

async function renderOverviewSub(el) {
  let members = [], upcomingEvents = [], teamTodos = [], teamLinks = [];

  try {
    const fetches = [
      fetch('/api/calendar-events', { headers: getHeaders() }).then(r => r.json()).catch(() => [])
    ];
    if (currentUser?.TeamID) {
      fetches.push(fetch('/api/team-workspace', { headers: getHeaders() }).then(r => r.json()).catch(() => ({})));
      fetches.push(fetch('/api/team-workspace/todos', { headers: getHeaders() }).then(r => r.json()).catch(() => []));
      fetches.push(fetch('/api/team-workspace/links', { headers: getHeaders() }).then(r => r.json()).catch(() => []));

    const [eventsRes, workspaceRes, todosRes, linksRes] = await Promise.all(fetches);

    teamTodos = todosRes || [];
    teamLinks = linksRes || [];

      </div>

      <div class="full-panel">
        <div class="panel-header"><h3>${t('h_upcoming_deadlines')}</h3></div>
        ${upcomingEvents.length ? upcomingEvents.map(ev => {

            </div>

        }).join('') : `<p class="text-muted" style="font-size:13px;">${t('no_events_month')}</p>`}

async function addTeamLink() {
  const titleInput = document.getElementById('teamLinkTitle');
  const urlInput = document.getElementById('teamLinkUrl');
  const title = titleInput.value.trim();
  let url = urlInput.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  const r = await fetch('/api/team-workspace/links', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ title, url }) });
  if (r.ok) {
    showToast(t('toast_link_added'), 'success');
    renderOverview(document.getElementById('pageContent'));
  } else {
    const d = await r.json();
    showToast(d.error || t('toast_failed'), 'error');
  }
}

async function deleteTeamLink(id) {
  await fetch('/api/team-workspace/links/' + id, { method: 'DELETE', headers: getHeaders() });
  showToast(t('toast_deleted'), 'info');
  renderOverview(document.getElementById('pageContent'));
}

async function addMemberTodo() {
  const input = document.getElementById('ownTodoInput');
  const title = input.value.trim();
  if (!title) return;
  input.value = '';
  const uid = currentUser.UserID;
  suppressNextAutoRefresh();
  try {
    const r = await fetch('/api/todos', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ title }) });
    const data = await r.json();
    (todosByUserCache[uid] = todosByUserCache[uid] || []).push({ TodoID: data.todoId, UserID: uid, Title: title, Completed: 0 });
    updateTodoCardDOM(uid);
  } catch (e) { showToast(t('toast_error'), 'error'); }
}

async function toggleMemberTodo(id, completed) {
  const uid = currentUser.UserID;
  suppressNextAutoRefresh();
  try {
    await fetch('/api/todos/' + id + '/toggle', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ completed }) });
    const item = (todosByUserCache[uid] || []).find(td => Number(td.TodoID) === Number(id));
    if (item) item.Completed = completed ? 1 : 0;
    updateTodoCardDOM(uid);
  } catch (e) { showToast(t('toast_error'), 'error'); }
}

async function deleteMemberTodo(id) {
  const uid = currentUser.UserID;
  suppressNextAutoRefresh();
  try {
    await fetch('/api/todos/' + id, { method: 'DELETE', headers: getHeaders() });
    todosByUserCache[uid] = (todosByUserCache[uid] || []).filter(td => Number(td.TodoID) !== Number(id));
    updateTodoCardDOM(uid);
  } catch (e) { showToast(t('toast_error'), 'error'); }
}

function previewImages(input) {
  const preview = document.getElementById('imagePreview');
  preview.innerHTML = '';
  if (input.files.length > 1) { alert('Only 1 cover image allowed.'); input.value = ''; return; }
  [...input.files].forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = e => { const img = document.createElement('img'); img.src = e.target.result; preview.appendChild(img); };
    r.readAsDataURL(f);
  });
}

const DOC_ICONS = { pdf: '', ppt: '', pptx: '', doc: '', docx: '' };
function previewDocs(input) {
  const preview = document.getElementById('docPreview');
  preview.innerHTML = '';
  [...input.files].forEach(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    const icon = DOC_ICONS[ext] || '';
    const chip = document.createElement('div');
    chip.style.cssText = 'display:flex;align-items:center;gap:6px;background:#ebebdf;border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:13px;';
    chip.innerHTML = `${icon} <span style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(f.name)}</span>`;
    preview.appendChild(chip);
  });
}

async function handleSubmit(e) {
  e.preventDefault();
  const title = document.getElementById('sTitle').value.trim();
  const description = document.getElementById('sDesc').value.trim();
  const weekLabel = document.getElementById('sWeek')?.value || '';
  const imagesInput = document.getElementById('sImages');
  const docsInput = document.getElementById('sDocs');
  const btn = document.getElementById('submitBtn');

  btn.disabled = true; btn.textContent = t('submitting');

  try {
    let r;
    if (editingId) {
      const fd = new FormData();
      fd.append('title', title);
      fd.append('description', description);
      if (imagesInput?.files) [...imagesInput.files].forEach(f => fd.append('images', f));
      if (docsInput?.files) [...docsInput.files].forEach(f => fd.append('documents', f));
      r = await fetch('/api/student/achievements/' + editingId, {
        method: 'PUT', headers: { Authorization: 'Bearer ' + token }, body: fd
      });
    } else {
      const fd = new FormData();
      fd.append('title', title);
      fd.append('description', description);
      if (weekLabel) fd.append('weekLabel', weekLabel);
      if (imagesInput?.files) [...imagesInput.files].forEach(f => fd.append('images', f));
      if (docsInput?.files) [...docsInput.files].forEach(f => fd.append('documents', f));
      r = await fetch('/api/student/achievements', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
    }

    if (r.ok) {
      editingId = null;
      showToast(t('toast_submitted'), 'success');
      switchTab('my');
    } else {
      const d = await r.json();
      showToast(d.error || t('toast_fail_sub'), 'error');
    }
  } catch (err) { showToast(t('toast_error'), 'error'); }
  finally { btn.disabled = false; btn.textContent = t('btn_submit'); }
}

async function openEdit(id) {
  const a = myAchievements.find(a => a.AchievementID === id);
  if (!a) return;
  editingId = id;
  let existingImages = [], existingDocuments = [];
  try {
    existingImages = await fetch('/api/achievements/' + id, { headers: getHeaders() }).then(r => r.json()).then(d => d.images || []);
    existingDocuments = await fetch('/api/achievements/' + id + '/documents', { headers: getHeaders() }).then(r => r.json());
  } catch (e) {}
  renderSubmitForm(document.getElementById('pageContent'), { title: a.Title, description: a.Description, weekLabel: a.WeekLabel, existingImages, existingDocuments });
  document.getElementById('topbarTitle').textContent = t('tb_edit');
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav .nav-item')[2]?.classList.add('active');
}

async function deleteSubmission(id) {
  if (!confirm(t('confirm_delete'))) return;
  const r = await fetch('/api/student/achievements/' + id, { method: 'DELETE', headers: getHeaders() });
  if (r.ok) { showToast(t('toast_deleted'), 'info'); switchTab('my'); }
  else showToast(t('toast_fail_delete'), 'error');
}

function openHelpModal() {
  document.getElementById('helpModal').classList.add('open');
  loadMyRequests();
}

function closeHelpModal() {
  document.getElementById('helpModal').classList.remove('open');
}

const REQUEST_STATUS_STYLE = {
  pending: 'background:#fef3c7;color:#92400e;',
  done: 'background:#dcfce7;color:#15803d;',
  rejected: 'background:#fee2e2;color:#991b1b;'
};

async function loadMyRequests() {
  const list = document.getElementById('myRequestsList');
  list.innerHTML = `<p class="text-muted" style="font-size:12px;">${t('loading')}</p>`;
  try {
    const requests = await fetch('/api/help-messages/mine', { headers: getHeaders() }).then(r => r.json());
    list.innerHTML = requests.length ? requests.map(r => `
      <div style="border:1px solid var(--border);border-radius:10px;padding:10px 12px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;">
          <span class="badge" style="${REQUEST_STATUS_STYLE[r.Status] || ''}">${t('status_' + r.Status)}</span>
          <span style="font-size:11px;color:var(--text-muted);flex-shrink:0;">${fmtDate(r.CreatedAt)}</span>
        </div>
        <p style="font-size:13px;margin:0;">${escHtml(r.Message)}</p>
      </div>`).join('') : `<p class="text-muted" style="font-size:12px;">${t('no_my_requests')}</p>`;
  } catch (e) {
    list.innerHTML = `<p class="text-muted" style="font-size:12px;">${t('err_load')}</p>`;
  }
}

async function sendHelpMessage() {
  const message = document.getElementById('helpMessage').value.trim();

  if (!message) {
    showToast(t('alert_msg_required'), 'error');
    return;
  }

  try {
    const res = await fetch('/api/help-messages', {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ message })
    });

    if (!res.ok) throw new Error();

    showToast(t('alert_msg_sent'), 'success');
    document.getElementById('helpMessage').value = '';
    loadMyRequests();

  } catch (err) {
    showToast(t('alert_msg_failed'), 'error');
  }
}

// ── NEWS FEED ──────────────────────────────────────────────────────────────────
let newsFeedCache = [];
let editingPostId = null;
let myLikedPosts = new Set();

async function renderNewsFeed(el) {
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const [posts, likes] = await Promise.all([
      fetch('/api/news-feed', { headers: getHeaders() }).then(r => r.json()),
      fetch('/api/news-feed/my-likes', { headers: getHeaders() }).then(r => r.json()).catch(() => [])
    ]);
    newsFeedCache = posts;
    myLikedPosts = new Set(likes);
  } catch(e) { newsFeedCache = []; }
  const isAdmin = currentUser?.Role === 'Admin';
  el.innerHTML = `
    <div class="page-header" style="margin-top:16px;">
      <div><h2> ${t('h_news_feed')}</h2><p>${t('news_feed_sub')}</p></div>
    </div>
    <div class="full-panel" style="margin-bottom:16px;">
      <textarea id="newPostContent" class="form-textarea" placeholder="${t('news_post_ph')}" rows="3" style="resize:vertical;width:100%;"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;">
        <button class="btn btn-primary" onclick="submitNewsFeedPost()">${t('news_post_btn')}</button>
      </div>
    </div>
    <div id="newsFeedPosts">
      ${newsFeedCache.length
        ? newsFeedCache.map(p => renderNewsFeedPostCard(p, isAdmin)).join('')
        : `<div class="full-panel"><div class="empty-state"><h3>${t('no_news')}</h3></div></div>`}
    </div>
    <div class="modal-overlay" id="editPostModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>${t('edit_post')}</h3>
          <button class="modal-close" onclick="closeModal('editPostModal')">X</button>
        </div>
        <div class="form-group">
          <textarea id="editPostContent" class="form-textarea" rows="5" style="resize:vertical;width:100%;"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveEditedPost()">${t('btn_save')}</button>
      </div>
    </div>`;
}

function renderNewsFeedPostCard(p, isAdmin) {
  const isOwn = Number(p.AuthorID) === Number(currentUser?.UserID);
  const roleColors = { Admin:'#dc2626', Leader:'#2563eb', Supervisor:'#7c3aed', Student:'#059669' };
  const badgeColor = roleColors[p.AuthorRole] || '#64748b';
  const edited = p.UpdatedAt && p.UpdatedAt !== p.CreatedAt;
  const liked = myLikedPosts.has(p.PostID);
  return `
    <div class="full-panel" style="margin-bottom:12px;" id="nfpost-${p.PostID}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <div style="width:38px;height:38px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#4a7099,#355a7d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;">
              ${p.AuthorPic ? `<img src="${escHtml(p.AuthorPic)}" style="width:100%;height:100%;object-fit:cover;">` : escHtml((p.AuthorName||'?').charAt(0).toUpperCase())}
            </div>
            <div>
              <div style="font-weight:700;font-size:14px;">${escHtml(p.AuthorName)}</div>
              <div style="font-size:11px;display:flex;align-items:center;gap:6px;">
                <span style="background:${badgeColor};color:#fff;border-radius:4px;padding:1px 6px;font-weight:600;">${escHtml(p.AuthorRole)}</span>
                <span style="color:var(--text-muted);">${fmtDate(p.CreatedAt)}${edited ? ' · edited' : ''}</span>
              </div>
            </div>
          </div>
          <p style="font-size:14px;line-height:1.7;white-space:pre-wrap;margin:0 0 12px;">${escHtml(p.Content)}</p>
          <div style="display:flex;gap:16px;align-items:center;padding-top:8px;border-top:1px solid var(--border);">
            <button onclick="toggleLike(${p.PostID})" style="background:none;border:none;cursor:pointer;font-size:13px;color:${liked ? '#e11d48' : 'var(--text-muted)'};font-weight:600;display:flex;align-items:center;gap:4px;">
              ${liked ? '&#9829;' : '&#9825;'} <span id="like-count-${p.PostID}">${p.LikeCount || 0}</span>
            </button>
            <button onclick="toggleComments(${p.PostID})" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-muted);font-weight:600;display:flex;align-items:center;gap:4px;">
              &#128172; <span>${p.CommentCount || 0} comments</span>
            </button>
            ${isOwn ? `<button class="btn btn-sm btn-ghost" style="margin-left:auto;" onclick="openEditPost(${p.PostID})">Edit</button>` : ''}
            ${(isOwn || isAdmin) ? `<button class="btn btn-sm btn-danger" onclick="deleteNewsFeedPost(${p.PostID})">Delete</button>` : ''}
          </div>
          <div id="comments-${p.PostID}" style="display:none;margin-top:12px;"></div>
        </div>
      </div>
    </div>`;
}

async function toggleLike(postId) {
  const r = await fetch('/api/news-feed/' + postId + '/like', { method: 'POST', headers: getHeaders() });
  if (!r.ok) return;
  const data = await r.json();
  if (data.liked) myLikedPosts.add(postId); else myLikedPosts.delete(postId);
  const btn = document.querySelector(`#nfpost-${postId} button[onclick="toggleLike(${postId})"]`);
  if (btn) {
    const post = newsFeedCache.find(p => p.PostID === postId);
    if (post) {
      post.LikeCount = (post.LikeCount || 0) + (data.liked ? 1 : -1);
      btn.innerHTML = `${data.liked ? '&#9829;' : '&#9825;'} <span id="like-count-${postId}">${post.LikeCount}</span>`;
      btn.style.color = data.liked ? '#e11d48' : 'var(--text-muted)';
    }
  }
}

async function toggleComments(postId) {
  const box = document.getElementById('comments-' + postId);
  if (!box) return;
  if (box.style.display !== 'none') { box.style.display = 'none'; return; }
  box.style.display = 'block';
  box.innerHTML = '<p style="font-size:12px;color:var(--text-muted);">Loading...</p>';
  const comments = await fetch('/api/news-feed/' + postId + '/comments', { headers: getHeaders() }).then(r => r.json()).catch(() => []);
  const isAdmin = currentUser?.Role === 'Admin';
  box.innerHTML = `
    <div id="comment-list-${postId}">
      ${comments.length ? comments.map(c => renderComment(c, isAdmin)).join('') : '<p style="font-size:12px;color:var(--text-muted);">No comments yet.</p>'}
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <input id="comment-input-${postId}" class="form-input" style="flex:1;font-size:13px;" placeholder="Write a comment...">
      <button class="btn btn-sm btn-primary" onclick="submitComment(${postId})">Post</button>
    </div>`;
}

function renderComment(c, isAdmin) {
  const isOwn = Number(c.AuthorID) === Number(currentUser?.UserID);
  return `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);">
    <div>
      <span style="font-weight:700;font-size:13px;">${escHtml(c.AuthorName)}</span>
      <span style="font-size:12px;color:var(--text-muted);margin-left:6px;">${fmtDate(c.CreatedAt)}</span>
      <p style="font-size:13px;margin:2px 0 0;line-height:1.5;">${escHtml(c.Content)}</p>
    </div>
    ${(isOwn || isAdmin) ? `<button onclick="deleteComment(${c.CommentID},${c.PostID})" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:12px;flex-shrink:0;">Remove</button>` : ''}
  </div>`;
}

async function submitComment(postId) {
  const input = document.getElementById('comment-input-' + postId);
  const content = input?.value.trim();
  if (!content) return;
  const r = await fetch('/api/news-feed/' + postId + '/comments', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ content }) });
  if (r.ok) {
    input.value = '';
    const comments = await fetch('/api/news-feed/' + postId + '/comments', { headers: getHeaders() }).then(r => r.json()).catch(() => []);
    const isAdmin = currentUser?.Role === 'Admin';
    const list = document.getElementById('comment-list-' + postId);
    if (list) list.innerHTML = comments.map(c => renderComment(c, isAdmin)).join('');
    const post = newsFeedCache.find(p => p.PostID === postId);
    if (post) post.CommentCount = (post.CommentCount || 0) + 1;
  }
}

async function deleteComment(commentId, postId) {
  if (!confirm('Delete this comment?')) return;
  const r = await fetch('/api/news-feed/comments/' + commentId, { method: 'DELETE', headers: getHeaders() });
  if (r.ok) {
    const comments = await fetch('/api/news-feed/' + postId + '/comments', { headers: getHeaders() }).then(r => r.json()).catch(() => []);
    const isAdmin = currentUser?.Role === 'Admin';
    const list = document.getElementById('comment-list-' + postId);
    if (list) list.innerHTML = comments.length ? comments.map(c => renderComment(c, isAdmin)).join('') : '<p style="font-size:12px;color:var(--text-muted);">No comments yet.</p>';
    const post = newsFeedCache.find(p => p.PostID === postId);
    if (post) post.CommentCount = Math.max(0, (post.CommentCount || 1) - 1);
  }
}

async function submitNewsFeedPost() {
  const content = document.getElementById('newPostContent').value.trim();
  if (!content) return showToast(t('toast_failed'), 'error');
  const r = await fetch('/api/news-feed', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ content }) });
  if (r.ok) {
    document.getElementById('newPostContent').value = '';
    showToast(t('toast_posted'), 'success');
    await refreshNewsFeedList();
  } else showToast(t('toast_failed'), 'error');
}

async function refreshNewsFeedList() {
  newsFeedCache = await fetch('/api/news-feed', { headers: getHeaders() }).then(r => r.json()).catch(() => []);
  const isAdmin = currentUser?.Role === 'Admin';
  const el = document.getElementById('newsFeedPosts');
  if (el) el.innerHTML = newsFeedCache.length
    ? newsFeedCache.map(p => renderNewsFeedPostCard(p, isAdmin)).join('')
    : `<div class="full-panel"><div class="empty-state"><h3>${t('no_news')}</h3></div></div>`;
}

function openEditPost(id) {
  const post = newsFeedCache.find(p => p.PostID === id);
  if (!post) return;
  editingPostId = id;
  document.getElementById('editPostContent').value = post.Content;
  openModal('editPostModal');
}

async function saveEditedPost() {
  const content = document.getElementById('editPostContent').value.trim();
  if (!content) return showToast(t('toast_failed'), 'error');
  const r = await fetch('/api/news-feed/' + editingPostId, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ content }) });
  if (r.ok) {
    closeModal('editPostModal');
    showToast(t('toast_post_updated'), 'success');
    await refreshNewsFeedList();
  } else showToast(t('toast_failed'), 'error');
}

async function deleteNewsFeedPost(id) {
  if (!confirm(t('confirm_delete_post'))) return;
  const r = await fetch('/api/news-feed/' + id, { method: 'DELETE', headers: getHeaders() });
  if (r.ok) {
    showToast(t('toast_deleted'), 'info');
    await refreshNewsFeedList();
  } else showToast(t('toast_failed'), 'error');
}

// ── Notifications ──────────────────────────────────────────────────────────
let _notifOpen = false;
function toggleNotifDropdown(e) {
  e.stopPropagation();
  _notifOpen = !_notifOpen;
  document.getElementById('notifDropdown').style.display = _notifOpen ? 'block' : 'none';
  if (_notifOpen) loadNotifList();
}
document.addEventListener('click', () => {
  if (_notifOpen) { _notifOpen = false; const d = document.getElementById('notifDropdown'); if (d) d.style.display = 'none'; }
});
async function loadNotifList() {
  const list = document.getElementById('notifList');
  list.innerHTML = '<p style="font-size:12px;color:var(--text-muted);padding:8px;">Loading…</p>';
  try {
    const notifs = await fetch('/api/notifications', { headers: getHeaders() }).then(r => r.json());
    if (!notifs.length) { list.innerHTML = '<p style="font-size:12px;color:var(--text-muted);padding:12px;text-align:center;">No notifications yet</p>'; return; }
    list.innerHTML = notifs.map(n => `
      <div onclick="markNotifRead('${n.NotificationID}',this)" id="notif_${n.NotificationID}" style="padding:10px 12px;border-radius:8px;cursor:pointer;background:${n.IsRead || n.dynamic ? 'transparent' : 'rgba(37,99,235,.06)'};border:1px solid ${n.IsRead || n.dynamic ? 'transparent' : 'rgba(37,99,235,.12)'};">
        <div style="font-size:13px;font-weight:${n.IsRead && !n.dynamic ? '500' : '700'};margin-bottom:2px;">${escHtml(n.Title)}</div>
        <div style="font-size:12px;color:var(--text-muted);">${escHtml(n.Message)}</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:3px;">${new Date(n.CreatedAt).toLocaleDateString()}</div>
      </div>`).join('');
  } catch(e) { list.innerHTML = '<p style="font-size:12px;color:var(--text-muted);padding:8px;">Failed to load.</p>'; }
}
async function markNotifRead(id, el) {
  if (String(id).startsWith('r_') || String(id).startsWith('e_')) return;
  try {
    await fetch(`/api/notifications/${id}/read`, { method: 'PUT', headers: getHeaders() });
    if (el) { el.style.background = 'transparent'; el.style.border = '1px solid transparent'; el.querySelector('div').style.fontWeight = '500'; }
    refreshNotifCount();
  } catch(e) {}
}
async function markAllNotifsRead() {
  try {
    await fetch('/api/notifications/mark-all-read', { method: 'PUT', headers: getHeaders() });
    loadNotifList(); refreshNotifCount();
  } catch(e) {}
}
async function refreshNotifCount() {
  try {
    const { count } = await fetch('/api/notifications/count', { headers: getHeaders() }).then(r => r.json());
    const badge = document.getElementById('notifCount');
    if (badge) { badge.textContent = count > 9 ? '9+' : count; badge.style.display = count > 0 ? 'inline-flex' : 'none'; }
  } catch(e) {}
}
setTimeout(refreshNotifCount, 1500);
setInterval(refreshNotifCount, 60000);

async function submitEventRequest() {
  const eventName = document.getElementById('erEventName').value.trim();
  const eventDate = document.getElementById('erEventDate').value;
  if (!eventName || !eventDate) { showToast('Event name and date are required.', 'error'); return; }
  try {
    const res = await fetch('/api/event-requests', {
      method: 'POST', headers: getHeaders(),
      body: JSON.stringify({
        eventName,
        eventSpeaker: document.getElementById('erEventSpeaker').value.trim(),
        eventDate,
        eventTime: document.getElementById('erEventTime').value,
        description: document.getElementById('erDescription').value.trim()
      })
    });
    if (!res.ok) throw new Error();
    showToast('Event request submitted!', 'success');
    closeModal('eventRequestModal');
    ['erEventName','erEventSpeaker','erEventDate','erEventTime','erDescription'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  } catch(e) { showToast('Failed to submit request.', 'error'); }
}
