  <script>
    (function() {
      const lang = localStorage.getItem('interntrack_lang') || 'en';
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    })();
  </script>
  <style>
    .leader-badge-pill {
      display: inline-flex; align-items: center; gap: 6px;

      padding: 3px 12px; font-size: 11px; font-weight: 600;
    }
    .user-info .leader-badge-pill,

</head>

<script>if (localStorage.getItem('interntrack_theme') === 'dark') document.body.classList.add('dark-mode');</script>

function t(k) { return T[currentLang]?.[k] ?? T.en[k] ?? k; }

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('interntrack_lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = lang === 'ar' ? 'English' : 'عربي';
  applyTranslations();
  switchTab(currentTabName);
}

function toggleLang() { setLang(currentLang === 'en' ? 'ar' : 'en'); }

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

new MutationObserver(mutations => {
  mutations.forEach(m => {
    m.addedNodes.forEach(node => {
      if (node.nodeType !== 1) return;
      if (node.dataset?.i18n) node.textContent = t(node.dataset.i18n);
      node.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
    });
  });
}).observe(document.documentElement, { childList: true, subtree: true });

// Real-time updates
(function() {
  const es = new EventSource('/api/events');
  let _rt;
  es.onmessage = () => { clearTimeout(_rt); _rt = setTimeout(() => switchTab(currentTabName), 300); };
})();

// ── CORE ──────────────────────────────────────────────────────────────────────
const token = (() => {
  const c = document.cookie.split(';').find(c => c.trim().startsWith('token='));
  return c ? c.trim().slice(6) : localStorage.getItem('token');
})();

if (!token) {
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;"><div style="text-align:center;"><h1>${t('not_authenticated')}</h1><a href="/" style="color:var(--primary);">${t('go_to_login')}</a></div></div>`;
}

let currentUser = null, editingId = null, myAchievements = [], pendingFromStudents = [];
let currentTabName = 'overview';

function getHeaders(json=true) {
  const h = { Authorization:'Bearer '+token };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return '—';
  const s = String(d).replace(' ', 'T');
  const dt = new Date(s);
  const locale = currentLang === 'ar' ? 'ar-AE' : 'en-US';
  return isNaN(dt) ? String(d) : dt.toLocaleDateString(locale,{month:'short',day:'numeric',year:'numeric'});
}

function showToast(msg,type='info') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+type;
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='toast',3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mainLayout').classList.toggle('expanded');
}

async function logout() {
  await fetch('/api/auth/logout',{method:'POST'});
  document.cookie='token=;max-age=0;path=/';
  localStorage.removeItem('token');
  window.location.href='/';

function switchTab(tab) {
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
  currentTabName = tab;
  localStorage.setItem('leaderCurrentTab', tab);
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(n=>n.classList.remove('active'));
  const navItems = document.querySelectorAll('.sidebar-nav .nav-item');
  const idx={overview:0,post:1,manage:2,calendar:3,settings:4,approvals:5,feedback:6};
  navItems[idx[tab]]?.classList.add('active');
  const titles={
    overview:  t('tb_overview'),
    post:      editingId ? t('tb_edit') : t('tb_post'),
    manage:    t('tb_manage'),
    approvals: t('tb_approvals'),
    calendar:  t('nav_calendar'),
    settings:  t('tb_settings'),
    feedback:  t('tb_supervisor_fb')
  };
  document.getElementById('topbarTitle').textContent=titles[tab]||tab;
  const el=document.getElementById('pageContent');
  switch(tab){
    case 'overview':  renderOverview(el); break;
    case 'post':      editingId=null; renderPostForm(el); break;
    case 'manage':    renderManage(el); break;
    case 'approvals': renderApprovals(el); break;
    case 'calendar':  renderCalendar(el); break;
    case 'settings':  renderSettings(el); break;
    case 'feedback':  renderSupervisorFeedback(el); break;
  }
}

async function loadAchievements() {
  const data = await fetch('/api/leader/achievements',{headers:getHeaders()}).then(r=>r.json());
  myAchievements = data.own || [];
  pendingFromStudents = data.pendingFromStudents || [];
  const badge = document.getElementById('pendingBadge');
  if (badge) {
    if (pendingFromStudents.length > 0) {
      badge.style.display = 'inline';
      badge.textContent = pendingFromStudents.length;
    } else {
      badge.style.display = 'none';
    }
  }

  // Check for supervisor feedback across ALL team achievements and show badge
  const allAchievements = [...myAchievements, ...pendingFromStudents];
  let totalFeedback = 0;
  await Promise.all(allAchievements.map(async a => {
    try {
      const fb = await fetch(`/api/team/achievements/${a.AchievementID}/supervisor-feedback`, {headers:getHeaders()}).then(r=>r.ok?r.json():[]);
      totalFeedback += fb.length;
    } catch(e) {}
  }));
  const fbBadge = document.getElementById('feedbackBadge');
  if (fbBadge) {
    if (totalFeedback > 0) { fbBadge.style.display='inline'; fbBadge.textContent=totalFeedback; }
    else { fbBadge.style.display='none'; }
  }

  return { own: myAchievements, pending: pendingFromStudents };
}

// ── CALENDAR (Events view-only; Reminders/To-do are private to this user) ────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }

let calendarViewDate = new Date();
let calendarEventsCache = [];
let remindersCache = [];
let calendarSideTab = 'events';

function calLocale() { return currentLang === 'ar' ? 'ar-AE' : 'en-US'; }

function calDowLabels() {
  const base = new Date(2024, 0, 1);
  return [0,1,2,3,4,5,6].map(i => {
    const d = new Date(base); d.setDate(base.getDate() + i);
    return d.toLocaleDateString(calLocale(), { weekday: 'short' });
  });
}

function calDateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

async function renderCalendar(el) {
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    [calendarEventsCache, remindersCache] = await Promise.all([
      fetch('/api/calendar-events', { headers: getHeaders() }).then(r => r.json()),
      fetch('/api/reminders', { headers: getHeaders() }).then(r => r.json())
    ]);
  } catch (e) {
    calendarEventsCache = []; remindersCache = [];
  }
  renderCalendarUI(el);
}

function switchCalSideTab(tabKey) {
  calendarSideTab = tabKey;
  renderCalendarUI(document.getElementById('pageContent'));
}

function calSidePanelBody(monthEvents) {
  if (calendarSideTab === 'reminders') {
    return `

        ${remindersCache.length ? remindersCache.map(r => `

          <div style="flex-shrink:0;background:#dce8f5;color:#3d5a7d;border-radius:10px;padding:8px 6px;text-align:center;width:46px;">

            ${ev.Description ? `<div style="font-size:12px;color:var(--text-muted);">${escHtml(ev.Description)}</div>` : ''}
          </div>
        </div>`;
      }).join('') : `<p class="text-muted" style="font-size:13px;">${t('no_events_month')}</p>`}
    </div>`;
}

function renderCalendarUI(el) {
  const year = calendarViewDate.getFullYear();
  const month = calendarViewDate.getMonth();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const eventsByDate = {};
  calendarEventsCache.forEach(ev => {
    (eventsByDate[ev.EventDate] = eventsByDate[ev.EventDate] || []).push(ev);
  });

  const now = new Date();
  const todayKey = calDateKey(now.getFullYear(), now.getMonth(), now.getDate());

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
  const monthEvents = calendarEventsCache
    .filter(ev => ev.EventDate.startsWith(monthPrefix))
    .slice()
    .sort((a, b) => (a.EventDate + (a.EventTime || '')).localeCompare(b.EventDate + (b.EventTime || '')));

  el.innerHTML = `
    <div class="page-header">
      <div><h2>${t('nav_calendar')}</h2></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;align-items:start;">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <button class="btn btn-sm btn-ghost" onclick="changeCalendarMonth(-1)">‹</button>
          <h3 style="margin:0;text-transform:capitalize;">${calendarViewDate.toLocaleDateString(calLocale(), { month: 'long', year: 'numeric' })}</h3>
          <button class="btn btn-sm btn-ghost" onclick="changeCalendarMonth(1)">›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:6px;">
          ${calDowLabels().map(d => `<div>${d}</div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
          ${cells.map(d => {
            if (!d) return `<div></div>`;
            const key = calDateKey(year, month, d);
            const has = !!eventsByDate[key];
            const isToday = key === todayKey;
            return `<div style="text-align:center;padding:10px 0;border-radius:10px;${isToday ? 'background:#dce8f5;' : ''}">
              <div style="font-size:13px;font-weight:${isToday ? '700' : '500'};">${d}</div>
              ${has ? `<div style="width:5px;height:5px;border-radius:50%;background:var(--primary);margin:4px auto 0;"></div>` : '<div style="height:9px;"></div>'}
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="panel">
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <button class="btn btn-sm ${calendarSideTab === 'events' ? 'btn-primary' : 'btn-ghost'}" onclick="switchCalSideTab('events')">${t('tab_events')}</button>
          <button class="btn btn-sm ${calendarSideTab === 'reminders' ? 'btn-primary' : 'btn-ghost'}" onclick="switchCalSideTab('reminders')">${t('tab_reminders')}</button>
        </div>
        ${calSidePanelBody(monthEvents)}
      </div>
    </div>

    <div class="modal-overlay" id="reminderModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>${t('h_add_reminder')}</h3>
          <button class="modal-close" onclick="closeModal('reminderModal')">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_reminder_title')}</label>
          <input id="reminderTitle" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">${t('lbl_description')}</label>
          <textarea id="reminderDescription" class="form-textarea"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">${t('th_date')}</label>
          <input id="reminderDate" type="date" class="form-input">
        </div>
        <div style="display:flex;gap:10px;">
          <div class="form-group" style="flex:1;">
            <label class="form-label">${t('lbl_start_time')}</label>
            <input id="reminderStart" type="time" class="form-input">
          </div>
          <div class="form-group" style="flex:1;">
            <label class="form-label">${t('lbl_end_time')}</label>
            <input id="reminderEnd" type="time" class="form-input">
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveReminder()">${t('btn_save_reminder')}</button>
      </div>
    </div>
  `;
}

function changeCalendarMonth(delta) {
  calendarViewDate.setMonth(calendarViewDate.getMonth() + delta);
  renderCalendarUI(document.getElementById('pageContent'));
}

function openReminderModal() {
  document.getElementById('reminderTitle').value = '';
  document.getElementById('reminderDescription').value = '';
  const now = new Date();
  document.getElementById('reminderDate').value = calDateKey(now.getFullYear(), now.getMonth(), now.getDate());
  document.getElementById('reminderStart').value = '';
  document.getElementById('reminderEnd').value = '';
  openModal('reminderModal');
}

async function saveReminder() {
  const title = document.getElementById('reminderTitle').value.trim();
  const description = document.getElementById('reminderDescription').value.trim();
  const reminderDate = document.getElementById('reminderDate').value;
  const startTime = document.getElementById('reminderStart').value;
  const endTime = document.getElementById('reminderEnd').value;
  if (!title) return showToast(t('err_reminder_required'), 'error');

  const r = await fetch('/api/reminders', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ title, description, reminderDate, startTime, endTime }) });
  if (r.ok) {
    closeModal('reminderModal');
    showToast(t('toast_created'), 'success');
    renderCalendar(document.getElementById('pageContent'));
  } else {
    showToast(t('toast_failed'), 'error');
  }
}

async function toggleReminder(id, completed) {
  await fetch('/api/reminders/' + id + '/toggle', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ completed }) });
  renderCalendar(document.getElementById('pageContent'));
}

async function deleteReminderItem(id) {
  if (!confirm(t('confirm_delete_reminder'))) return;
  await fetch('/api/reminders/' + id, { method: 'DELETE', headers: getHeaders() });
  showToast(t('toast_deleted'), 'info');
  renderCalendar(document.getElementById('pageContent'));
}

async function saveProfile() {
  const name = document.getElementById('profileName').value.trim();
  const email = document.getElementById('profileEmail').value.trim();
  const phone = document.getElementById('profilePhone').value.trim();
  if (!name || !email) return showToast(t('err_name_email'), 'error');

  const r = await fetch('/api/profile', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ name, email, phone }) });
  if (r.ok) {

  } else {
    const d = await r.json();
    showToast(d.error || t('toast_failed'), 'error');
  }
}

async function savePassword() {
  const password = document.getElementById('newPassword').value;
  if (!password || password.length < 6) return showToast(t('err_password_length'), 'error');

  const r = await fetch('/api/profile', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ password }) });
  if (r.ok) {
    document.getElementById('newPassword').value = '';
    closeModal('passwordModal');
    showToast(t('toast_password_updated'), 'success');
  } else {
    const d = await r.json();
    showToast(d.error || t('toast_failed'), 'error');
  }
}

// ── SUPERVISOR FEEDBACK TAB ───────────────────────────────────────────────────
async function renderSupervisorFeedback(el) {
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  await loadAchievements();

  // Fetch supervisor feedback for every achievement the leader can see
  const allAchievements = [...myAchievements, ...pendingFromStudents];
  // Deduplicate by AchievementID
  const seen = new Set();
  const uniqueAchievements = allAchievements.filter(a => {
    if (seen.has(a.AchievementID)) return false;
    seen.add(a.AchievementID); return true;
  });

  const feedbackMap = {};
  await Promise.all(uniqueAchievements.map(async a => {
    try {
      const fb = await fetch(`/api/team/achievements/${a.AchievementID}/supervisor-feedback`, {headers:getHeaders()}).then(r=>r.ok?r.json():[]);
      feedbackMap[a.AchievementID] = fb;
    } catch(e) { feedbackMap[a.AchievementID] = []; }
  }));

  const achievementsWithFeedback = uniqueAchievements.filter(a => feedbackMap[a.AchievementID]?.length > 0);
  const totalCount = achievementsWithFeedback.reduce((sum,a) => sum + feedbackMap[a.AchievementID].length, 0);

  el.innerHTML=`
    <div class="page-header">
      <div>
        <h2>${t('h_supervisor_fb')}</h2>
        <p style="color:var(--text-muted);font-size:14px;">${t('sub_supervisor_fb')}</p>
      </div>
    </div>

    <div style="background:linear-gradient(135deg,#fef3c7,#fffbeb);border:1.5px solid #f59e0b;border-radius:14px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:14px;">
      <span style="font-size:26px;">🔒</span>
      <div>
        <strong style="color:#92400e;">${t('supervisor_feedback_lbl')}</strong>
        <p style="font-size:13px;color:#78350f;margin-top:2px;">${t('sub_supervisor_fb')}</p>
      </div>
      ${totalCount > 0 ? `<span style="margin-left:auto;background:#f59e0b;color:#fff;border-radius:20px;padding:4px 14px;font-weight:700;font-size:13px;">${totalCount}</span>` : ''}
    </div>

    ${achievementsWithFeedback.length === 0 ? `
      <div class="full-panel">
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <h3>${t('no_supervisor_fb')}</h3>
          <p>${t('no_supervisor_fb_sub')}</p>
        </div>
      </div>` :
      achievementsWithFeedback.map(a => `
        <div class="full-panel" style="margin-bottom:16px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">

async function renderOverviewSub(el) {
  let members = [], upcomingEvents = [], teamTodos = [], teamLinks = [];

  try {
    const fetches = [
      fetch('/api/calendar-events', { headers: getHeaders() }).then(r => r.json()).catch(() => [])
    ];
    if (currentUser?.TeamID) {
      fetches.push(fetch('/api/team-workspace', { headers: getHeaders() }).then(r => r.json()).catch(() => ({})));
      fetches.push(fetch('/api/team-workspace/todos', { headers: getHeaders() }).then(r => r.json()).catch(() => []));
      fetches.push(fetch('/api/team-workspace/links', { headers: getHeaders() }).then(r => r.json()).catch(() => []));
    }
    const [eventsRes, workspaceRes, todosRes, linksRes] = await Promise.all(fetches);
    const todayStr = new Date().toISOString().slice(0, 10);
    upcomingEvents = (eventsRes || []).filter(ev => ev.EventDate >= todayStr).slice(0, 3);

    teamLinks = linksRes || [];

    const isOwn = Number(m.UserID) === Number(currentUser?.UserID);
    const items = todosByUser[m.UserID] || [];
    const doneCount = items.filter(td => td.Completed).length;
    const percent = items.length ? Math.round((doneCount / items.length) * 100) : 0;

      <div class="full-panel">
        <div style="margin-bottom:14px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            ${memberAvatarHtml(m, 28)}
            <h3 style="font-size:14px;margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(m.Name)}</h3>
            <span class="badge ${m.Role === 'Leader' ? 'badge-blue' : 'badge-green'}" style="flex-shrink:0;">${m.Role === 'Leader' ? t('leader_badge') : t('member_badge')}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;">
              <div style="width:${percent}%;height:100%;background:var(--primary);border-radius:99px;"></div>
            </div>
            <span style="font-size:11px;color:var(--text-muted);flex-shrink:0;">${percent}%</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:${isOwn ? '12px' : '0'};">
          ${items.length ? items.map(td => `
            <div style="display:flex;align-items:center;gap:8px;">
              <input type="checkbox" ${td.Completed ? 'checked' : ''} ${isOwn ? `onchange="toggleMemberTodo(${td.TodoID},this.checked)"` : 'disabled'}>
              <span style="flex:1;font-size:13px;${td.Completed ? 'text-decoration:line-through;color:var(--text-muted);' : ''}">${escHtml(td.Title)}</span>
              ${isOwn ? `<button class="btn btn-sm btn-ghost" onclick="deleteMemberTodo(${td.TodoID})">🗑️</button>` : ''}
            </div>`).join('') : `<p class="text-muted" style="font-size:12px;margin:0;">${t('no_todos')}</p>`}
        </div>
        ${isOwn ? `
        <div style="display:flex;gap:8px;">
          <input id="ownTodoInput" class="form-input" placeholder="${t('todo_ph')}" onkeydown="if(event.key==='Enter'){addMemberTodo();}">
          <button class="btn btn-primary btn-sm" onclick="addMemberTodo()">${t('btn_add_todo')}</button>
        </div>` : ''}
      </div>`;
  };

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:20px;">
      <div class="full-panel">
        <div class="panel-header"><h3>${t('h_team_members')}</h3></div>
        ${members.length ? members.map(m => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:center;gap:12px;">
              ${memberAvatarHtml(m, 40)}
              <div>
                <div style="font-weight:700;font-size:14px;">${escHtml(m.Name)}</div>
                <div style="font-size:11px;color:var(--text-muted);">ID: ${m.UserID}</div>
              </div>
            </div>
            <span class="badge ${m.Role === 'Leader' ? 'badge-blue' : 'badge-green'}">${m.Role === 'Leader' ? t('leader_badge') : t('member_badge')}</span>
          </div>`).join('') : `<p class="text-muted" style="font-size:13px;">${t('no_team_members')}</p>`}
      </div>

      <div class="full-panel">
        <div class="panel-header"><h3>${t('h_upcoming_deadlines')}</h3></div>
        ${upcomingEvents.length ? upcomingEvents.map(ev => {
          const d = new Date(ev.EventDate + 'T00:00:00');
          return `<div style="display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
            <div style="width:36px;height:36px;border-radius:8px;background:#dce8f5;color:#3d5a7d;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fa-regular fa-calendar"></i></div>
            <div>
              <div style="font-weight:700;font-size:13px;">${escHtml(ev.Title)}</div>
              <div style="font-size:11px;color:var(--text-muted);">${d.toLocaleDateString(currentLang === 'ar' ? 'ar-AE' : 'en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
            </div>
          </div>`;
        }).join('') : `<p class="text-muted" style="font-size:13px;">${t('no_events_month')}</p>`}
      </div>
    </div>

    <h3 style="font-size:16px;font-weight:700;margin-bottom:14px;">${t('h_team_todos')}</h3>

      <div style="display:flex;gap:8px;margin-bottom:14px;">

        <button class="btn btn-primary btn-sm" onclick="addTeamLink()">${t('btn_add_link')}</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${teamLinks.length ? teamLinks.map(l => `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f2f2ea;border-radius:10px;">
            <i class="fa-solid fa-link" style="font-size:16px;color:#3d5a7d;width:22px;text-align:center;flex-shrink:0;"></i>
            <div style="flex:1;min-width:0;">
              <a href="${escHtml(l.URL)}" target="_blank" rel="noopener" style="font-size:13px;font-weight:600;color:var(--text);text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(l.Title || l.URL)}</a>
              <div style="font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(l.AdderName || '')} · ${fmtDate(l.CreatedAt)}</div>
            </div>
            <button class="btn btn-sm btn-ghost" onclick="deleteTeamLink(${l.LinkID})">🗑️</button>
          </div>`).join('') : `<p class="text-muted" style="font-size:13px;">${t('no_shared_links')}</p>`}
      </div>
    </div>`;
}

async function addMemberTodo() {
  const input = document.getElementById('ownTodoInput');
  const title = input.value.trim();
  if (!title) return;
  await fetch('/api/todos', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ title }) });
  renderOverview(document.getElementById('pageContent'));
}

async function toggleMemberTodo(id, completed) {
  await fetch('/api/todos/' + id + '/toggle', { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ completed }) });
  renderOverview(document.getElementById('pageContent'));
}

async function deleteMemberTodo(id) {
  await fetch('/api/todos/' + id, { method: 'DELETE', headers: getHeaders() });
  renderOverview(document.getElementById('pageContent'));
}

async function addTeamLink() {
  const titleInput = document.getElementById('teamLinkTitle');
  const urlInput = document.getElementById('teamLinkUrl');
  const title = titleInput.value.trim();
  let url = urlInput.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  const r = await fetch('/api/team-workspace/links', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ title, url }) });
  if (r.ok) {
    showToast(t('toast_link_added'), 'success');
    renderOverview(document.getElementById('pageContent'));
  } else {
    const d = await r.json();
    showToast(d.error || t('toast_failed'), 'error');
  }
}

async function deleteTeamLink(id) {
  await fetch('/api/team-workspace/links/' + id, { method: 'DELETE', headers: getHeaders() });
  showToast(t('toast_deleted'), 'info');
  renderOverview(document.getElementById('pageContent'));
}

function previewImages(input) {
  const preview=document.getElementById('imagePreview');
  preview.innerHTML='';
  if(input.files.length>5){alert(t('max_images'));input.value='';return;}
  [...input.files].forEach(f=>{
    if(!f.type.startsWith('image/')) return;
    const r=new FileReader();
    r.onload=e=>{const img=document.createElement('img');img.src=e.target.result;preview.appendChild(img);};
    r.readAsDataURL(f);
  });
}

const DOC_ICONS = { pdf: '📄', ppt: '📊', pptx: '📊', doc: '📝', docx: '📝' };

function previewDocs(input) {
  const preview = document.getElementById('docPreview');
  preview.innerHTML = '';
  [...input.files].forEach(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    const icon = DOC_ICONS[ext] || '📎';
    const chip = document.createElement('div');
    chip.style.cssText = 'display:flex;align-items:center;gap:6px;background:#ebebdf;border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:13px;';
    chip.innerHTML = `${icon} <span style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(f.name)}</span>`;
    preview.appendChild(chip);
  });
}

async function submitAchievement(e) {
  e.preventDefault();
  const title=document.getElementById('aTitle').value.trim();
  const description=document.getElementById('aDesc').value.trim();
  const status=document.getElementById('aStatus').value;
  const imagesInput=document.getElementById('aImages');
  const docsInput=document.getElementById('aDocs');
  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent=t('saving');
  try {
    let r;
    if(editingId) {
      const fd=new FormData();
      fd.append('title',title); fd.append('description',description); fd.append('status',status);
      if(imagesInput?.files) [...imagesInput.files].forEach(f=>fd.append('images',f));
      if(docsInput?.files) [...docsInput.files].forEach(f=>fd.append('documents',f));
      r=await fetch('/api/leader/achievements/'+editingId,{method:'PUT',headers:{Authorization:'Bearer '+token},body:fd});
    } else {
      const fd=new FormData();
      fd.append('title',title); fd.append('description',description); fd.append('status',status);
      if(imagesInput?.files) [...imagesInput.files].forEach(f=>fd.append('images',f));
      if(docsInput?.files) [...docsInput.files].forEach(f=>fd.append('documents',f));
      r=await fetch('/api/leader/achievements',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});
    }
    if(r.ok){ editingId=null; showToast(t('toast_saved'),'success'); switchTab('manage'); }
    else { const d=await r.json(); showToast(d.error||t('err_post'),'error'); }
  } catch(err){ showToast(t('err_post'),'error'); }
  finally { btn.disabled=false; btn.textContent=editingId?t('btn_update'):t('btn_post'); }
}

  await Promise.all(pendingFromStudents.map(async a => {
    try {
      const fb = await fetch(`/api/team/achievements/${a.AchievementID}/supervisor-feedback`, { headers: getHeaders() }).then(r => r.ok ? r.json() : []);
      feedbackMap[a.AchievementID] = fb;
    } catch(e) { feedbackMap[a.AchievementID] = []; }
  }));

  el.innerHTML=`
    <div class="page-header">
      <div><h2>${t('h_submissions')}</h2><p>${pendingFromStudents.length} ${t('awaiting_review')}</p></div>
    </div>
    ${pendingFromStudents.length ? pendingFromStudents.map(a=>`
    <div class="full-panel" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;">${escHtml(a.Title)}</h3>
            <span class="badge" style="background:#fef3c7;color:#92400e;">${t('lbl_pending_badge')}</span>
          </div>
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:6px;">${t('submitted_by')} <strong>${escHtml(a.CreatorName)}</strong> · ${fmtDate(a.CreatedAt)}</p>
          <p style="font-size:14px;line-height:1.7;white-space:pre-wrap;">${escHtml(a.Description)}</p>
          ${feedbackMap[a.AchievementID]?.length ? `
          <div style="background:linear-gradient(135deg,#fef3c7,#fffbeb);border:1.5px solid #f59e0b;border-radius:12px;padding:14px 16px;margin-top:14px;">
            <div style="font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;">🔒 ${t('supervisor_feedback_lbl')}</div>
            ${feedbackMap[a.AchievementID].map(f=>`
            <div style="background:#fff;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;margin-bottom:6px;">
              <div style="font-size:12px;color:#92400e;font-weight:600;margin-bottom:3px;">🎓 ${escHtml(f.AuthorName)} · ${fmtDate(f.CreatedAt)}</div>
              <div style="font-size:13px;color:#374151;">${escHtml(f.Content)}</div>
            </div>`).join('')}
          </div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;min-width:160px;">
          <button class="btn btn-success" onclick="reviewAchievement(${a.AchievementID},'approve')">${t('btn_approve_publish')}</button>
          <button class="btn btn-danger" onclick="promptReject(${a.AchievementID})">${t('btn_reject_feedback')}</button>
        </div>
      </div>
    </div>`).join('') : `
    <div class="full-panel">
      <div class="empty-state">
        <div class="empty-icon">✅</div>
        <h3>${t('h_all_caught')}</h3>
        <p>${t('no_pending')}</p>
      </div>
    </div>`}`;
}

async function reviewAchievement(id, action, feedback='') {
  const r = await fetch('/api/leader/achievements/'+id+'/review', {
    method:'POST', headers:getHeaders(),
    body: JSON.stringify({ action, feedback })
  });
  if(r.ok) {
    showToast(action==='approve' ? t('toast_approved') : t('toast_rejected'), action==='approve'?'success':'info');
    renderApprovals(document.getElementById('pageContent'));
  } else showToast(t('toast_fail_review'),'error');
}

function promptReject(id) {
  const feedback = prompt(t('reject_prompt')) ?? null;
  if (feedback === null) return;
  reviewAchievement(id, 'reject', feedback);
}

async function openEdit(id) {
  const a = myAchievements.find(a=>a.AchievementID===id);
  if(!a) return;
  editingId=id;
  let existingImages = [], existingDocuments = [];
  try {
    existingImages = await fetch('/api/achievements/' + id, { headers: getHeaders() }).then(r => r.json()).then(d => d.images || []);
    existingDocuments = await fetch('/api/achievements/' + id + '/documents', { headers: getHeaders() }).then(r => r.json());
  } catch (e) {}
  renderPostForm(document.getElementById('pageContent'),{title:a.Title,description:a.Description,status:a.Status,existingImages,existingDocuments});
  document.getElementById('topbarTitle').textContent=t('tb_edit');
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav .nav-item')[1]?.classList.add('active');
}

async function deleteAchievement(id) {
  if(!confirm(t('confirm_delete'))) return;
  const r=await fetch('/api/leader/achievements/'+id,{method:'DELETE',headers:getHeaders()});
  if(r.ok){ showToast(t('toast_deleted'),'info'); switchTab('manage'); }
  else showToast(t('toast_fail_delete'),'error');
}

(async () => {
  const savedLang = localStorage.getItem('interntrack_lang') || 'en';
  currentLang = savedLang;
  document.getElementById('langBtn').textContent = savedLang === 'ar' ? 'English' : 'عربي';
  applyTranslations();

  try {
    currentUser=await fetch('/api/auth/me',{headers:getHeaders()}).then(r=>r.json());
    document.getElementById('leaderName').textContent=currentUser.Name||'Leader';
    document.getElementById('teamBadge').textContent=(currentUser.TeamName||'Leader')+' · '+t('lbl_team_leader');
  } catch(e) {}
  switchTab(localStorage.getItem('leaderCurrentTab') || 'overview');
})();
</script>
</body>
